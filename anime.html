<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading...</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #0b0b0f; --purple: #8b5cf6; }
        body { background: #0b0b0f; color: white; }
        .glass { background: rgba(18,18,24,0.85); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- Navbar (same as index) -->
    <nav class="fixed top-0 left-0 right-0 z-50 border-b border-white/10 bg-[#0b0b0f]/90 backdrop-blur-xl">
        <div class="max-w-screen-2xl mx-auto flex items-center justify-between px-6 py-4">
            <button onclick="history.back()" class="text-2xl"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="flex items-center gap-x-3">
                <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center">
                    <span class="text-white font-bold">A</span>
                </div>
                <span class="logo-font text-2xl font-semibold">AnimeVault</span>
            </div>
            <button onclick="openSearchModal()" class="text-xl"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </nav>

    <div class="pt-20 max-w-screen-2xl mx-auto px-6">
        <!-- Banner -->
        <div id="banner" class="h-96 md:h-[500px] rounded-3xl overflow-hidden relative mb-8">
            <img id="banner-img" class="w-full h-full object-cover" alt="">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0b0b0f] via-[#0b0b0f]/70 to-transparent"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Left Info -->
            <div class="lg:col-span-8">
                <h1 id="title" class="text-5xl font-bold logo-font tracking-tighter"></h1>
                <p id="japanese" class="text-white/60 text-xl mt-2"></p>

                <div id="meta" class="flex flex-wrap gap-4 mt-6 text-sm"></div>

                <div class="mt-10">
                    <h2 class="text-2xl font-semibold mb-4">Synopsis</h2>
                    <p id="synopsis" class="leading-relaxed text-white/80"></p>
                </div>

                <div class="mt-12">
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-x-3">
                        Episodes 
                        <span id="ep-count" class="text-sm bg-purple-500/20 text-purple-400 px-3 py-1 rounded-2xl"></span>
                    </h2>
                    <div id="episodes-list" class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 gap-3"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-8">
                <img id="poster" class="w-full rounded-3xl shadow-2xl" alt="">

                <div class="glass rounded-3xl p-6 space-y-6">
                    <div><strong>Score:</strong> <span id="score" class="text-3xl font-bold text-yellow-400"></span></div>
                    <div><strong>Status:</strong> <span id="status"></span></div>
                    <div><strong>Year:</strong> <span id="year"></span></div>
                    <div><strong>Studios:</strong> <span id="studios"></span></div>
                </div>

                <button onclick="watchFirstEpisode()" 
                        class="w-full bg-gradient-to-r from-purple-500 to-pink-500 py-6 rounded-3xl text-xl font-semibold hover:scale-105 transition-all flex items-center justify-center gap-x-3">
                    <i class="fa-solid fa-play"></i> WATCH NOW
                </button>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const malId = params.get('id');

        async function loadAnime() {
            const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
            const { data } = await res.json();

            document.getElementById('page-title').textContent = data.title + " - AnimeVault";
            document.getElementById('banner-img').src = data.images.jpg.large_image_url;
            document.getElementById('poster').src = data.images.jpg.image_url;
            document.getElementById('title').textContent = data.title;
            document.getElementById('japanese').textContent = data.title_japanese || '';
            document.getElementById('synopsis').textContent = data.synopsis || 'No synopsis available.';

            // Meta
            let metaHTML = `
                <span class="bg-white/10 px-4 py-2 rounded-3xl">${data.type}</span>
                <span class="bg-white/10 px-4 py-2 rounded-3xl">${data.status}</span>
                <span class="bg-white/10 px-4 py-2 rounded-3xl">${data.episodes || '?'} Episodes</span>
            `;
            document.getElementById('meta').innerHTML = metaHTML;

            document.getElementById('score').textContent = data.score ? data.score.toFixed(1) : 'N/A';
            document.getElementById('status').textContent = data.status;
            document.getElementById('year').textContent = data.year || data.aired?.from?.split('-')[0];
            document.getElementById('studios').textContent = data.studios.map(s => s.name).join(', ') || 'Unknown';

            // Episodes
            const epContainer = document.getElementById('episodes-list');
            epContainer.innerHTML = '';
            const totalEps = data.episodes || 24;

            for (let i = 1; i <= Math.min(totalEps, 48); i++) {
                const btn = document.createElement('button');
                btn.className = "bg-white/5 hover:bg-purple-500/20 border border-white/10 hover:border-purple-500 transition-all py-4 rounded-2xl text-sm font-medium";
                btn.textContent = `Episode ${i}`;
                btn.onclick = () => window.location.href = `watch.html?id=${malId}&ep=${i}&type=sub`;
                epContainer.appendChild(btn);
            }
        }

        function watchFirstEpisode() {
            window.location.href = `watch.html?id=${malId}&ep=1&type=sub`;
        }

        window.onload = loadAnime;
    </script>
</body>
</html>
