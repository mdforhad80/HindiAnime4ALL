<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherAnime - Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --purple: #8b5cf6;
            --pink: #d946ef;
        }
        body { background-color: var(--bg); color: #f3f4f6; }
        .glass { background: rgba(18, 18, 24, 0.85); backdrop-filter: blur(16px); }
        .neon { box-shadow: 0 0 25px rgba(139, 92, 246, 0.6); }
    </style>
</head>
<body class="min-h-screen">
    <!-- HEADER (Same as index.html) -->
    <header class="sticky top-0 z-50 bg-[#0b0b0f]/95 backdrop-blur-md border-b border-purple-500/20">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <button onclick="history.back()" class="text-3xl"><i class="fas fa-arrow-left"></i></button>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center text-xl font-bold">A</div>
                <span class="text-2xl font-bold">AETHER<span class="text-pink-400">ANIME</span></span>
            </div>
            <button onclick="showSearchModal()" class="text-3xl"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div class="max-w-screen-2xl mx-auto">
        <!-- HERO BANNER -->
        <div id="banner" class="h-[60vh] bg-cover bg-center relative">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0b0b0f] via-[#0b0b0f]/80 to-transparent"></div>
            <div class="absolute bottom-0 left-0 p-8 max-w-3xl">
                <h1 id="title" class="text-5xl md:text-6xl font-bold mb-2"></h1>
                <p id="japanese" class="text-xl text-purple-300 mb-4"></p>
                
                <div id="meta" class="flex flex-wrap gap-4 text-sm"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 px-6 -mt-10 relative z-10">
            <!-- POSTER -->
            <div class="lg:col-span-3">
                <div id="poster" class="rounded-3xl overflow-hidden neon shadow-2xl"></div>
                
                <div class="mt-6 glass rounded-3xl p-6">
                    <button onclick="watchFirstEpisode()" 
                            class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:scale-105 transition">
                        <i class="fas fa-play"></i> WATCH NOW (SUB)
                    </button>
                    <button onclick="watchFirstEpisodeDub()" 
                            class="w-full mt-3 border border-purple-400 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-purple-500/10 transition">
                        <i class="fas fa-play"></i> WATCH DUB
                    </button>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="lg:col-span-9">
                <div class="glass rounded-3xl p-8">
                    <h2 class="text-2xl font-semibold mb-4">Synopsis</h2>
                    <p id="synopsis" class="leading-relaxed text-gray-300"></p>
                    
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mt-10 text-sm" id="info-grid"></div>
                </div>

                <!-- EPISODES -->
                <div class="mt-10">
                    <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
                        Episodes 
                        <span id="episode-count" class="text-purple-400 text-base font-normal"></span>
                    </h2>
                    <div id="episodes-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
                </div>

                <!-- RECOMMENDATIONS -->
                <div class="mt-16">
                    <h2 class="text-3xl font-bold mb-6">You Might Also Like</h2>
                    <div id="recommendations" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const malId = params.get('id');

        if (!malId) {
            document.body.innerHTML = `<div class="text-center py-40 text-3xl">Invalid Anime ID</div>`;
        }

        async function loadAnime() {
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
                const json = await res.json();
                const anime = json.data;

                // Set title
                document.title = `${anime.title} - AetherAnime`;

                // Banner
                document.getElementById('banner').style.backgroundImage = `url(${anime.images.jpg.large_image_url})`;
                
                // Poster
                document.getElementById('poster').innerHTML = `
                    <img src="${anime.images.jpg.large_image_url}" class="w-full" alt="${anime.title}">
                `;

                document.getElementById('title').textContent = anime.title_english || anime.title;
                document.getElementById('japanese').textContent = anime.title_japanese || '';
                
                // Meta
                let metaHTML = `
                    <span class="bg-white/10 px-4 py-1 rounded-full">${anime.type}</span>
                    <span class="bg-white/10 px-4 py-1 rounded-full">${anime.status}</span>
                    <span class="bg-white/10 px-4 py-1 rounded-full">${anime.score ? anime.score + ' ★' : 'N/A'}</span>
                    <span class="bg-white/10 px-4 py-1 rounded-full">${anime.episodes || '?'} Episodes</span>
                `;
                document.getElementById('meta').innerHTML = metaHTML;

                document.getElementById('synopsis').textContent = anime.synopsis || 'No synopsis available.';

                // Info Grid
                const info = document.getElementById('info-grid');
                info.innerHTML = `
                    <div><strong>Genres:</strong> ${anime.genres.map(g => g.name).join(', ')}</div>
                    <div><strong>Studios:</strong> ${anime.studios.map(s => s.name).join(', ')}</div>
                    <div><strong>Premiered:</strong> ${anime.aired.string || 'Unknown'}</div>
                    <div><strong>Duration:</strong> ${anime.duration}</div>
                    <div><strong>Source:</strong> ${anime.source}</div>
                    <div><strong>Rating:</strong> ${anime.rating}</div>
                `;

                document.getElementById('episode-count').textContent = `(${anime.episodes || '??'} Episodes)`;

                // Generate Episodes
                const epList = document.getElementById('episodes-list');
                epList.innerHTML = '';
                
                const totalEps = anime.episodes || 24;
                for (let i = 1; i <= Math.min(totalEps, 50); i++) {
                    const epDiv = document.createElement('div');
                    epDiv.className = `glass rounded-2xl p-5 cursor-pointer hover:scale-105 transition flex items-center gap-4`;
                    epDiv.innerHTML = `
                        <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-2xl font-bold">${i}</div>
                        <div>
                            <div class="font-medium">Episode ${i}</div>
                            <div class="text-purple-400 text-sm">Sub & Dub</div>
                        </div>
                    `;
                    epDiv.onclick = () => {
                        window.location.href = `watch.html?id=${malId}&ep=${i}&type=sub`;
                    };
                    epList.appendChild(epDiv);
                }

                // Load Recommendations
                loadRecommendations(anime);

            } catch (err) {
                console.error(err);
                alert("Failed to load anime data.");
            }
        }

        async function loadRecommendations(anime) {
            try {
                const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}/recommendations`);
                const data = await res.json();
                const container = document.getElementById('recommendations');
                container.innerHTML = '';
                
                data.data?.slice(0, 10).forEach(rec => {
                    const a = rec.entry;
                    const card = document.createElement('div');
                    card.className = "cursor-pointer";
                    card.innerHTML = `
                        <img src="${a.images.jpg.image_url}" class="rounded-2xl w-full aspect-[9/13] object-cover">
                        <p class="text-sm mt-3 line-clamp-2 font-medium">${a.title}</p>
                    `;
                    card.onclick = () => window.location.href = `anime.html?id=${a.mal_id}`;
                    container.appendChild(card);
                });
            } catch(e) {}
        }

        function watchFirstEpisode() {
            window.location.href = `watch.html?id=${malId}&ep=1&type=sub`;
        }
        function watchFirstEpisodeDub() {
            window.location.href = `watch.html?id=${malId}&ep=1&type=dub`;
        }

        function showSearchModal() {
            alert("Search modal coming in full project :)");
        }

        window.onload = loadAnime;
    </script>
</body>
</html>
