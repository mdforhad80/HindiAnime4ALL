<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnimeStream - Anime Details">
    <meta property="og:title" content="AnimeStream - Watch Anime">
    <meta property="og:description" content="Discover anime details, episodes, and start watching.">
    <title>AnimeStream - Anime Details</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --bg-tertiary: #1a1a24;
            --purple: #8b5cf6;
            --purple-dark: #7c3aed;
            --purple-glow: rgba(139, 92, 246, 0.4);
            --pink: #d946ef;
            --pink-glow: rgba(217, 70, 239, 0.35);
            --text: #f3f4f6;
            --text-secondary: #d1d5db;
            --muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.16);
            --glass: rgba(18, 18, 24, 0.75);
            --glass-strong: rgba(18, 18, 24, 0.9);
            --card-radius: 16px;
            --card-radius-sm: 10px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .cursor-glow {
            position: fixed; pointer-events: none; z-index: 9999; width: 300px; height: 300px;
            border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
            transform: translate(-50%, -50%); transition: opacity 0.3s; opacity: 0;
        }
        body:hover .cursor-glow { opacity: 1; }
        @media (max-width: 768px) { .cursor-glow { display: none; } }
        .particles-container { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:0; overflow:hidden; }
        .particle { position:absolute; border-radius:50%; animation: floatUp linear infinite; opacity:0; }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity:0; }
            5% { opacity:0.7; }
            90% { opacity:0.1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity:0; }
        }
        .navbar {
            position: sticky; top:0; z-index:1000; display:flex; align-items:center; justify-content: space-between;
            height: 60px; padding:0 16px; background: var(--glass-strong); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); gap:12px;
        }
        .navbar-left, .navbar-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
        .navbar-center { display:flex; align-items:center; justify-content:center; flex:1; gap:8px; min-width:0; }
        .navbar-logo {
            font-size:1.3rem; font-weight:800; letter-spacing:-0.5px; background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            white-space:nowrap; text-decoration:none; display:flex; align-items:center; gap:6px;
        }
        .navbar-logo-icon { font-size:1.5rem; -webkit-text-fill-color:initial; }
        .navbar-logo-text { font-size:1.1rem; font-weight:700; background: linear-gradient(135deg, var(--purple), var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .icon-btn {
            display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:50%;
            background:transparent; border:none; color:var(--text); cursor:pointer; transition: all var(--transition-fast); font-size:1.2rem;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.08); color:var(--purple); }
        .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1001; opacity:0; pointer-events:none; transition: opacity var(--transition-smooth); }
        .sidebar-overlay.open { opacity:1; pointer-events:auto; }
        .sidebar {
            position:fixed; top:0; left:-300px; width:260px; height:100%; background:var(--bg-secondary); z-index:1002;
            transition: left var(--transition-smooth); display:flex; flex-direction:column; border-right:1px solid var(--border);
            overflow-y:auto; padding:16px 0;
        }
        .sidebar.open { left:0; }
        .sidebar-header { padding:12px 20px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .sidebar-nav { flex:1; padding:8px 0; }
        .sidebar-nav a {
            display:flex; align-items:center; gap:12px; padding:12px 20px; color:var(--text-secondary); text-decoration:none;
            transition: all var(--transition-fast); font-size:0.95rem; border-left:3px solid transparent;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { color:var(--text); background:rgba(139,92,246,0.08); border-left-color:var(--purple); }
        .search-overlay {
            position:fixed; inset:0; background:var(--glass-strong); backdrop-filter:blur(24px); z-index:1003;
            display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity var(--transition-smooth);
        }
        .search-overlay.open { opacity:1; pointer-events:auto; }
        .search-overlay-header { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); }
        .search-overlay-input { flex:1; background:var(--bg-tertiary); border:1px solid var(--border); border-radius:24px; padding:10px 18px; color:var(--text); font-size:1rem; outline:none; }
        .search-overlay-input:focus { border-color:var(--purple); box-shadow:0 0 0 3px var(--purple-glow); }
        .search-overlay-results { flex:1; overflow-y:auto; padding:16px; }
        .main-content { position:relative; z-index:1; padding:0 16px 80px; max-width:1200px; margin:0 auto; }
        .anime-banner { position:relative; height:280px; background-size:cover; background-position:center 30%; border-radius:0 0 16px 16px; }
        @media(min-width:768px){ .anime-banner{ height:380px; } }
        .anime-banner::after { content:''; position:absolute; inset:0; background:linear-gradient(to top, var(--bg) 0%, transparent 50%); }
        .anime-detail-grid { display:flex; gap:24px; margin-top:-80px; position:relative; z-index:2; flex-wrap:wrap; padding:0 16px; }
        .anime-poster { width:180px; border-radius:var(--card-radius); overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5); border:2px solid var(--border); flex-shrink:0; }
        .anime-poster img { width:100%; display:block; }
        .anime-info { flex:1; min-width:280px; padding-top:60px; }
        .anime-title-main { font-size:2rem; font-weight:800; line-height:1.2; }
        .anime-subtitle { color:var(--muted); font-size:0.9rem; margin:4px 0 12px; }
        .anime-meta-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
        .badge { padding:4px 10px; border-radius:14px; font-size:0.7rem; font-weight:600; background:rgba(139,92,246,0.15); color:var(--purple); border:1px solid rgba(139,92,246,0.3); }
        .synopsis { color:var(--text-secondary); font-size:0.9rem; line-height:1.7; margin-bottom:20px; }
        .info-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:10px; font-size:0.85rem; }
        .info-item { color:var(--muted); }
        .info-item strong { color:var(--text); display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
        .section-heading { display:flex; align-items:center; justify-content:space-between; margin:28px 0 14px; }
        .section-heading h2 { font-size:1.3rem; font-weight:700; padding-left:14px; position:relative; }
        .section-heading h2::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:4px; height:22px; border-radius:2px; background:linear-gradient(180deg, var(--purple), var(--pink)); }
        .episode-list { display:flex; flex-wrap:wrap; gap:8px; max-height:400px; overflow-y:auto; }
        .ep-btn {
            padding:8px 14px; border-radius:8px; background:var(--bg-tertiary); border:1px solid var(--border); color:var(--text);
            cursor:pointer; font-size:0.8rem; transition:all var(--transition-fast); text-decoration:none;
        }
        .ep-btn:hover { border-color:var(--purple); background:rgba(139,92,246,0.15); }
        .anime-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:14px; }
        .anime-card {
            position:relative; border-radius:var(--card-radius); overflow:hidden; background:var(--bg-tertiary);
            border:1px solid var(--border); transition:all var(--transition-smooth); cursor:pointer; text-decoration:none; color:inherit;
        }
        .anime-card:hover { transform:translateY(-6px); border-color:var(--purple); box-shadow:0 12px 32px rgba(139,92,246,0.2); }
        .anime-card-poster { aspect-ratio:3/4; overflow:hidden; }
        .anime-card-poster img { width:100%; height:100%; object-fit:cover; transition:transform var(--transition-smooth); }
        .anime-card:hover .anime-card-poster img { transform:scale(1.08); }
        .anime-card-info { padding:10px 12px; }
        .anime-card-title { font-weight:600; font-size:0.85rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .btn {
            display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border-radius:24px; font-weight:600;
            font-size:0.9rem; cursor:pointer; border:none; transition:all var(--transition-fast); text-decoration:none;
        }
        .btn-primary { background:var(--purple); color:#fff; box-shadow:0 4px 16px var(--purple-glow); }
        .btn-primary:hover { background:var(--purple-dark); transform:translateY(-2px); }
        .btn-secondary { background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--border); }
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(120px); background:var(--bg-tertiary); padding:10px 20px; border-radius:24px; z-index:2000; font-size:0.85rem; border:1px solid var(--border); transition:transform var(--transition-smooth); pointer-events:none; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .skeleton { background:linear-gradient(90deg, var(--bg-tertiary) 25%, rgba(255,255,255,0.05) 50%, var(--bg-tertiary) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
        @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
        .hidden { display:none!important; }
    </style>
</head>
<body>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="particles-container" id="particlesContainer"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight:700;font-size:1.1rem;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">AnimeStream</span>
            <button class="icon-btn" id="sidebarClose">✕</button>
        </div>
        <div class="sidebar-nav">
            <a href="index.html">🏠 Home</a>
            <a href="search.html">🔍 Search</a>
            <a href="schedule.html">📅 Schedule</a>
            <a href="creator.html">👤 Creator</a>
        </div>
    </nav>
    <div class="search-overlay" id="searchOverlay">
        <div class="search-overlay-header">
            <button class="icon-btn" id="searchOverlayClose">✕</button>
            <input type="text" class="search-overlay-input" id="searchOverlayInput" placeholder="Search anime..." autocomplete="off">
        </div>
        <div class="search-overlay-results" id="searchOverlayResults"></div>
    </div>
    <header class="navbar">
        <div class="navbar-left"><button class="icon-btn" id="menuToggle">☰</button></div>
        <div class="navbar-center"><a href="index.html" class="navbar-logo"><span class="navbar-logo-icon">🎬</span><span class="navbar-logo-text">AnimeStream</span></a></div>
        <div class="navbar-right"><button class="icon-btn" id="searchToggle">🔍</button></div>
    </header>
    <main class="main-content" id="mainContent">
        <div class="anime-banner" id="animeBanner"></div>
        <div class="anime-detail-grid">
            <div class="anime-poster"><img id="animePoster" src="" alt=""></div>
            <div class="anime-info" id="animeInfo">
                <div class="skeleton" style="height:32px;width:70%;margin-bottom:8px;"></div>
                <div class="skeleton" style="height:18px;width:40%;margin-bottom:12px;"></div>
                <div class="skeleton" style="height:14px;width:100%;margin-bottom:6px;"></div>
            </div>
        </div>
        <div id="episodesSection" class="hidden">
            <div class="section-heading"><h2>Episodes</h2></div>
            <div class="episode-list" id="episodeList"></div>
        </div>
        <div id="charactersSection" class="hidden">
            <div class="section-heading"><h2>Characters</h2></div>
            <div class="anime-grid" id="charactersGrid"></div>
        </div>
        <div id="recommendationsSection" class="hidden">
            <div class="section-heading"><h2>Recommendations</h2></div>
            <div class="anime-grid" id="recommendationsGrid"></div>
        </div>
    </main>
    <div class="toast" id="toast"></div>
    <script>
        const CONFIG = {
            JIKAN_BASE: 'https://api.jikan.moe/v4',
            STREAM_BASE: 'https://megaplay.buzz/stream/mal',
        };
        const Storage = {
            get(key, fallback = null) { try { return JSON.parse(localStorage.getItem('as_'+key)) || fallback; } catch { return fallback; } },
            set(key, value) { try { localStorage.setItem('as_'+key, JSON.stringify(value)); } catch {} },
            getWatchHistory() { return this.get('watchHistory', []); },
            addWatchHistory(item) {
                let h = this.getWatchHistory(); h = h.filter(x=>x.mal_id!==item.mal_id);
                h.unshift({...item, timestamp:Date.now()}); if(h.length>50) h=h.slice(0,50); this.set('watchHistory',h);
            },
        };
        const UI = {
            toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); },
            createAnimeCard(anime) {
                const a = anime.entry || anime;
                const title = a.title_english || a.title || 'Unknown';
                const poster = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
                return `<a href="anime.html?id=${a.mal_id}" class="anime-card">
                    <div class="anime-card-poster"><img src="${poster}" alt="${title}" loading="lazy"></div>
                    <div class="anime-card-info"><div class="anime-card-title">${title}</div></div>
                </a>`;
            },
        };
        async function fetchAPI(url, cacheKey) {
            if(cacheKey) { const c=Storage.get('cache_'+cacheKey); if(c && Date.now()-c.timestamp<1800000) return c.data; }
            try {
                const res = await fetch(url); if(!res.ok) throw new Error(res.status);
                const data = await res.json();
                if(cacheKey) Storage.set('cache_'+cacheKey, {data, timestamp:Date.now()});
                return data;
            } catch(e) { return null; }
        }
        async function loadAnime() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(!id) { document.getElementById('mainContent').innerHTML='<p style="text-align:center;padding:40px;">Anime ID missing.</p>'; return; }
            const data = await fetchAPI(`${CONFIG.JIKAN_BASE}/anime/${id}/full`, `anime_${id}`);
            if(!data || !data.data) { document.getElementById('mainContent').innerHTML='<p style="text-align:center;padding:40px;">Anime not found.</p>'; return; }
            const anime = data.data;
            document.title = `${anime.title_english || anime.title} - AnimeStream`;
            document.getElementById('animeBanner').style.backgroundImage = `url(${anime.images?.jpg?.large_image_url || ''})`;
            document.getElementById('animePoster').src = anime.images?.jpg?.large_image_url || '';
            document.getElementById('animeInfo').innerHTML = `
                <h1 class="anime-title-main">${anime.title_english || anime.title}</h1>
                <p class="anime-subtitle">${anime.title_japanese || ''} ${anime.title_synonyms?.length ? '/ ' + anime.title_synonyms.join(', ') : ''}</p>
                <div class="anime-meta-row">
                    <span class="badge">${anime.rating || 'PG'}</span>
                    <span class="badge">${anime.type || 'TV'}</span>
                    <span class="badge">${anime.status?.replace(/_/g,' ') || 'Unknown'}</span>
                    <span class="badge">★ ${(anime.score||0).toFixed(1)}</span>
                </div>
                <p class="synopsis">${anime.synopsis || 'No synopsis available.'}</p>
                <div class="info-grid">
                    <div class="info-item"><strong>Country</strong> ${anime.country || 'Japan'}</div>
                    <div class="info-item"><strong>Genres</strong> ${anime.genres?.map(g=>g.name).join(', ') || 'N/A'}</div>
                    <div class="info-item"><strong>Premiered</strong> ${anime.premiered || 'N/A'}</div>
                    <div class="info-item"><strong>Date Aired</strong> ${anime.aired?.string || 'N/A'}</div>
                    <div class="info-item"><strong>Broadcast</strong> ${anime.broadcast?.string || 'N/A'}</div>
                    <div class="info-item"><strong>Episodes</strong> ${anime.episodes || '?'}</div>
                    <div class="info-item"><strong>Duration</strong> ${anime.duration || 'N/A'}</div>
                    <div class="info-item"><strong>Status</strong> ${anime.status?.replace(/_/g,' ') || 'N/A'}</div>
                    <div class="info-item"><strong>Scores</strong> ${anime.score} (${anime.scored_by?.toLocaleString()} users)</div>
                    <div class="info-item"><strong>Studios</strong> ${anime.studios?.map(s=>s.name).join(', ') || 'N/A'}</div>
                    <div class="info-item"><strong>Producers</strong> ${anime.producers?.map(p=>p.name).join(', ') || 'N/A'}</div>
                </div>
                <p style="margin-top:12px;"><a href="https://myanimelist.net/anime/${anime.mal_id}/" target="_blank" style="color:var(--purple);">MAL Page ↗</a></p>
                <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                    <a href="watch.html?id=${anime.mal_id}&ep=1&type=sub" class="btn btn-primary">▶ Watch Sub</a>
                    <a href="watch.html?id=${anime.mal_id}&ep=1&type=dub" class="btn btn-secondary">▶ Watch Dub</a>
                </div>
            `;
            Storage.addWatchHistory({ mal_id: anime.mal_id, title: anime.title_english || anime.title, poster: anime.images?.jpg?.small_image_url, type: anime.type });
            loadEpisodes(id);
            loadCharacters(id);
            loadRecommendations(id);
        }
        async function loadEpisodes(id) {
            const data = await fetchAPI(`${CONFIG.JIKAN_BASE}/anime/${id}/episodes`, `ep_${id}`);
            if(!data || !data.data?.length) return;
            document.getElementById('episodesSection').classList.remove('hidden');
            const container = document.getElementById('episodeList');
            container.innerHTML = data.data.map(ep => 
                `<a href="watch.html?id=${id}&ep=${ep.mal_id}&type=sub" class="ep-btn">Ep ${ep.mal_id}: ${ep.title || 'Episode '+ep.mal_id}</a>`
            ).join('');
        }
        async function loadCharacters(id) {
            const data = await fetchAPI(`${CONFIG.JIKAN_BASE}/anime/${id}/characters`, `char_${id}`);
            if(!data || !data.data?.length) return;
            document.getElementById('charactersSection').classList.remove('hidden');
            document.getElementById('charactersGrid').innerHTML = data.data.slice(0,12).map(c => `
                <div class="anime-card" style="text-align:center;">
                    <div class="anime-card-poster"><img src="${c.character.images?.jpg?.image_url || ''}" alt="${c.character.name}"></div>
                    <div class="anime-card-info"><div class="anime-card-title">${c.character.name}</div><small style="color:var(--muted)">${c.role}</small></div>
                </div>`).join('');
        }
        async function loadRecommendations(id) {
            const data = await fetchAPI(`${CONFIG.JIKAN_BASE}/anime/${id}/recommendations`, `rec_${id}`);
            if(!data || !data.data?.length) return;
            document.getElementById('recommendationsSection').classList.remove('hidden');
            document.getElementById('recommendationsGrid').innerHTML = data.data.slice(0,8).map(r => UI.createAnimeCard(r)).join('');
        }
        function initParticles() {
            const container = document.getElementById('particlesContainer');
            for(let i=0;i<25;i++) {
                const p = document.createElement('div'); p.className='particle';
                const size = Math.random()*3+1.5;
                p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${['#8b5cf6','#d946ef'][i%2]};animation-duration:${Math.random()*12+10}s;animation-delay:${Math.random()*10}s;box-shadow:0 0 ${size*3}px currentColor;`;
                container.appendChild(p);
            }
        }
        document.addEventListener('DOMContentLoaded', ()=>{
            initParticles();
            document.getElementById('menuToggle').addEventListener('click', ()=>{
                document.getElementById('sidebar').classList.add('open');
                document.getElementById('sidebarOverlay').classList.add('open');
            });
            document.getElementById('sidebarClose').addEventListener('click', ()=>{
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('open');
            });
            document.getElementById('sidebarOverlay').addEventListener('click', ()=>{
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('open');
            });
            const searchOv = document.getElementById('searchOverlay');
            document.getElementById('searchToggle').addEventListener('click', ()=>{ searchOv.classList.add('open'); document.getElementById('searchOverlayInput').focus(); });
            document.getElementById('searchOverlayClose').addEventListener('click', ()=> searchOv.classList.remove('open'));
            loadAnime();
        });
    </script>
</body>
</html>
