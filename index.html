<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVault - Premium Anime Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --purple: #8b5cf6;
            --pink: #d946ef;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(18, 18, 24, 0.75);
            backdrop-filter: blur(16px);
        }

        .neon-glow {
            box-shadow: 0 0 15px -3px rgb(139 92 246),
                        0 0 6px -4px rgb(217 70 239);
        }

        .hero-bg {
            background: linear-gradient(180deg, rgba(11,11,15,0.6) 0%, rgba(11,11,15,0.95) 100%);
        }

        .anime-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .anime-card:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .player-container {
            aspect-ratio: 16 / 9;
        }

        .cursor-glow {
            position: fixed;
            width: 24px;
            height: 24px;
            border: 2px solid #8b5cf6;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            display: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="bg-[#0b0b0f] text-white overflow-x-hidden">
    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 border-b border-white/10 bg-[#0b0b0f]/80 backdrop-blur-xl">
        <div class="max-w-screen-2xl mx-auto">
            <div class="flex items-center justify-between px-6 py-4">
                <!-- LEFT: Menu -->
                <button onclick="toggleSidebar()" 
                        class="flex items-center gap-x-3 text-white hover:text-purple-400 transition-colors">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>

                <!-- CENTER: Logo -->
                <div class="flex items-center gap-x-3 absolute left-1/2 -translate-x-1/2">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center">
                        <span class="text-white font-bold text-2xl leading-none mt-0.5">A</span>
                    </div>
                    <div>
                        <span class="logo-font text-3xl font-semibold tracking-tighter">AnimeVault</span>
                    </div>
                </div>

                <!-- RIGHT: Search -->
                <button onclick="openSearchModal()" 
                        class="flex items-center gap-x-2 bg-white/5 hover:bg-white/10 transition-colors px-5 py-2.5 rounded-3xl text-sm font-medium">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span class="hidden md:inline">Search anime...</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <div id="sidebar" class="fixed left-0 top-0 bottom-0 w-72 bg-[#121218] border-r border-white/10 translate-x-[-100%] transition-transform duration-300 z-50 flex flex-col">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center">
                        <span class="text-white font-bold text-xl">A</span>
                    </div>
                    <span class="logo-font text-2xl font-semibold">AnimeVault</span>
                </div>
                <button onclick="toggleSidebar()" class="text-white/70 hover:text-white">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>

            <div class="space-y-1">
                <a href="index.html" class="flex items-center gap-x-3 px-4 py-3 rounded-3xl hover:bg-white/5 text-purple-400">
                    <i class="fa-solid fa-house w-5"></i>
                    <span class="font-medium">Home</span>
                </a>
                <a href="search.html" class="flex items-center gap-x-3 px-4 py-3 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-magnifying-glass w-5"></i>
                    <span class="font-medium">Browse</span>
                </a>
                <a href="schedule.html" class="flex items-center gap-x-3 px-4 py-3 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-calendar w-5"></i>
                    <span class="font-medium">Schedule</span>
                </a>
                <a href="#" onclick="randomAnime()" class="flex items-center gap-x-3 px-4 py-3 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-dice w-5"></i>
                    <span class="font-medium">Random Anime</span>
                </a>
            </div>
        </div>

        <div class="mt-auto p-6 border-t border-white/10">
            <a href="creator.html" class="flex items-center gap-x-3 text-white/60 hover:text-white text-sm">
                <i class="fa-solid fa-user"></i>
                <span>Creator</span>
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="pt-20 pb-12 min-h-screen">
        <!-- HERO SLIDER -->
        <div class="relative h-screen max-h-[640px] overflow-hidden" id="hero-slider">
            <!-- Will be populated by JS -->
        </div>

        <!-- CONTINUE WATCHING -->
        <div class="max-w-screen-2xl mx-auto px-6 mt-12">
            <div class="flex items-end justify-between mb-6">
                <h2 class="text-3xl font-semibold">Continue Watching</h2>
                <a href="#" class="text-purple-400 text-sm flex items-center gap-x-1 hover:gap-x-2 transition-all">
                    View all <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
            <div id="continue-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- TRENDING -->
        <div class="max-w-screen-2xl mx-auto px-6 mt-16">
            <div class="flex items-end justify-between mb-6">
                <h2 class="text-3xl font-semibold">Trending Now</h2>
            </div>
            <div id="trending-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- NEW RELEASES -->
        <div class="max-w-screen-2xl mx-auto px-6 mt-16">
            <div class="flex items-end justify-between mb-6">
                <h2 class="text-3xl font-semibold">New Releases</h2>
            </div>
            <div id="new-releases-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-black/40 border-t border-white/10 py-12">
        <div class="max-w-screen-2xl mx-auto px-6 text-center">
            <div class="flex justify-center items-center gap-x-8 text-2xl mb-8">
                <a href="#" class="hover:text-purple-400 transition-colors"><i class="fa-brands fa-discord"></i></a>
                <a href="https://github.com" target="_blank" class="hover:text-purple-400 transition-colors"><i class="fa-brands fa-github"></i></a>
            </div>
            <p class="text-white/40 text-sm">Built with ❤️ for anime fans • Data from Jikan API</p>
            <p class="text-white/30 text-xs mt-2">Demo Project • Not affiliated with any streaming service</p>
        </div>
    </footer>

    <!-- SEARCH MODAL -->
    <div id="search-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-start justify-center pt-24">
        <div class="w-full max-w-2xl px-4">
            <div class="glass rounded-3xl border border-white/10 overflow-hidden">
                <div class="relative">
                    <input id="modal-search-input" 
                           type="text" 
                           placeholder="Search anime, characters..." 
                           class="w-full bg-transparent px-8 py-6 text-2xl outline-none border-b border-white/10"
                           onkeyup="if(event.key === 'Enter') performSearch(this.value)">
                    <button onclick="closeSearchModal()" 
                            class="absolute right-8 top-1/2 -translate-y-1/2 text-white/40 hover:text-white">
                        <i class="fa-solid fa-xmark text-3xl"></i>
                    </button>
                </div>
                <div id="search-results" class="max-h-[60vh] overflow-auto p-4">
                    <!-- Live results -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tailwind script
        function initTailwind() {
            // Already using CDN
        }

        // Global variables
        let currentAnimeData = {};

        // API Base
        const JIKAN_BASE = "https://api.jikan.moe/v4";

        // Fetch with rate limit handling
        async function jikanFetch(endpoint) {
            try {
                const res = await fetch(`${JIKAN_BASE}${endpoint}`);
                if (!res.ok) throw new Error("API error");
                return await res.json();
            } catch(e) {
                console.error(e);
                return { data: [] };
            }
        }

        // Create Anime Card
        function createAnimeCard(anime) {
            const card = document.createElement("div");
            card.className = `anime-card group bg-[#121218] rounded-3xl overflow-hidden cursor-pointer`;
            card.innerHTML = `
                <div class="relative">
                    <img src="${anime.images.jpg.large_image_url || anime.images.jpg.image_url}" 
                         class="w-full aspect-[27/40] object-cover" alt="${anime.title}">
                    <div class="absolute top-3 right-3 bg-black/70 text-xs px-2 py-1 rounded-xl backdrop-blur">
                        ${anime.score ? anime.score.toFixed(1) : '??'} ★
                    </div>
                    ${anime.episodes ? `<div class="absolute bottom-3 left-3 bg-purple-600 text-[10px] px-2 py-0.5 rounded-lg">${anime.episodes} EPS</div>` : ''}
                </div>
                <div class="p-4">
                    <p class="font-medium line-clamp-2 leading-tight group-hover:text-purple-400 transition-colors">${anime.title}</p>
                    <p class="text-xs text-white/50 mt-1">${anime.type || 'TV'} • ${anime.year || ''}</p>
                </div>
            `;
            card.onclick = () => {
                window.location.href = `anime.html?id=${anime.mal_id}`;
            };
            return card;
        }

        // Load Trending
        async function loadTrending() {
            const container = document.getElementById("trending-grid");
            container.innerHTML = `<div class="col-span-full text-center py-12 text-white/40">Loading trending anime...</div>`;
            
            const data = await jikanFetch("/top/anime?limit=12");
            
            container.innerHTML = "";
            data.data.forEach(anime => {
                container.appendChild(createAnimeCard(anime));
            });
        }

        // Load New Releases (Seasonal)
        async function loadNewReleases() {
            const container = document.getElementById("new-releases-grid");
            const data = await jikanFetch("/seasons/now?limit=12");
            
            container.innerHTML = "";
            data.data.forEach(anime => {
                container.appendChild(createAnimeCard(anime));
            });
        }

        // Hero Slider
        async function loadHero() {
            const container = document.getElementById("hero-slider");
            const data = await jikanFetch("/top/anime?limit=5");
            
            let html = `
                <div class="swiper heroSwiper h-full">
                    <div class="swiper-wrapper">`;
            
            data.data.forEach((anime, i) => {
                html += `
                    <div class="swiper-slide relative">
                        <img src="${anime.images.jpg.large_image_url}" class="absolute inset-0 w-full h-full object-cover" alt="">
                        <div class="hero-bg absolute inset-0"></div>
                        <div class="absolute inset-0 flex items-center">
                            <div class="max-w-screen-2xl mx-auto px-8 md:px-16">
                                <div class="max-w-md">
                                    <div class="inline-flex items-center gap-x-2 bg-white/10 backdrop-blur px-4 py-1 rounded-3xl text-sm mb-6">
                                        <span class="text-emerald-400">●</span>
                                        ${anime.status}
                                    </div>
                                    <h1 class="text-6xl md:text-7xl font-bold leading-none logo-font tracking-tighter mb-4">${anime.title}</h1>
                                    <p class="text-lg text-white/70 line-clamp-3 mb-8">${anime.synopsis ? anime.synopsis.substring(0, 180) + '...' : ''}</p>
                                    <div class="flex items-center gap-x-4">
                                        <button onclick="watchAnime(${anime.mal_id}, 1)" 
                                                class="flex-1 md:flex-none bg-white text-black px-10 py-5 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-all">
                                            <i class="fa-solid fa-play"></i>
                                            <span>WATCH NOW</span>
                                        </button>
                                        <button onclick="viewAnimeDetails(${anime.mal_id})" 
                                                class="flex-1 md:flex-none border border-white/60 hover:border-white px-8 py-5 rounded-3xl font-medium transition-all">
                                            MORE INFO
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            
            html += `</div>
                <div class="swiper-pagination !bottom-12"></div>
            </div>`;
            
            container.innerHTML = html;
            
            new Swiper('.heroSwiper', {
                loop: true,
                autoplay: {
                    delay: 4500,
                },
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                }
            });
        }

        function viewAnimeDetails(id) {
            window.location.href = `anime.html?id=${id}`;
        }

        function watchAnime(id, ep = 1) {
            window.location.href = `watch.html?id=${id}&ep=${ep}&type=sub`;
        }

        // Random Anime
        async function randomAnime() {
            const data = await jikanFetch("/random/anime");
            if (data.data) {
                window.location.href = `anime.html?id=${data.data.mal_id}`;
            }
        }

        // Search Modal
        function openSearchModal() {
            document.getElementById("search-modal").classList.remove("hidden");
            document.getElementById("modal-search-input").focus();
        }

        function closeSearchModal() {
            document.getElementById("search-modal").classList.add("hidden");
        }

        async function performSearch(query) {
            if (!query || query.length < 2) return;
            
            const resultsDiv = document.getElementById("search-results");
            resultsDiv.innerHTML = `<div class="p-8 text-center text-white/50">Searching...</div>`;
            
            const data = await jikanFetch(`/anime?q=${encodeURIComponent(query)}&limit=12`);
            
            resultsDiv.innerHTML = "";
            
            const grid = document.createElement("div");
            grid.className = "grid grid-cols-3 gap-4";
            
            data.data.forEach(anime => {
                const miniCard = document.createElement("div");
                miniCard.className = "cursor-pointer";
                miniCard.innerHTML = `
                    <img src="${anime.images.jpg.image_url}" class="w-full rounded-2xl aspect-square object-cover mb-2">
                    <p class="text-sm line-clamp-2">${anime.title}</p>
                `;
                miniCard.onclick = () => {
                    closeSearchModal();
                    window.location.href = `anime.html?id=${anime.mal_id}`;
                };
                grid.appendChild(miniCard);
            });
            
            resultsDiv.appendChild(grid);
        }

        // Sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            if (sidebar.style.transform === "translateX(0px)") {
                sidebar.style.transform = "translateX(-100%)";
            } else {
                sidebar.style.transform = "translateX(0px)";
            }
        }

        // Continue Watching (LocalStorage)
        function loadContinueWatching() {
            const container = document.getElementById("continue-grid");
            const history = JSON.parse(localStorage.getItem("watchHistory") || "[]");
            
            if (history.length === 0) {
                container.innerHTML = `<div class="col-span-full py-8 text-white/40 text-center">No continue watching yet. Start an anime!</div>`;
                return;
            }
            
            container.innerHTML = "";
            history.slice(0, 6).forEach(item => {
                const div = document.createElement("div");
                div.className = "anime-card bg-[#121218] rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <div class="relative">
                        <img src="${item.image}" class="w-full aspect-video object-cover">
                        <div class="absolute bottom-0 left-0 right-0 h-1 bg-purple-500" style="width: ${item.progress || 45}%"></div>
                    </div>
                    <div class="p-3">
                        <p class="text-sm font-medium">${item.title}</p>
                        <p class="text-xs text-white/50">Ep ${item.ep}</p>
                    </div>
                `;
                div.onclick = () => {
                    window.location.href = `watch.html?id=${item.id}&ep=${item.ep}&type=sub`;
                };
                container.appendChild(div);
            });
        }

        // Keyboard shortcuts
        function setupKeyboard() {
            document.addEventListener("keydown", (e) => {
                if (e.key === "/" && document.getElementById("search-modal").classList.contains("hidden")) {
                    e.preventDefault();
                    openSearchModal();
                }
                if (e.key === "Escape") {
                    const modal = document.getElementById("search-modal");
                    if (!modal.classList.contains("hidden")) closeSearchModal();
                }
            });
        }

        // Fake some history for demo
        function seedHistory() {
            if (!localStorage.getItem("watchHistory")) {
                const demoHistory = [
                    {
                        id: 20,
                        title: "Naruto",
                        ep: 45,
                        image: "https://picsum.photos/id/1015/300/170",
                        progress: 65
                    },
                    {
                        id: 5114,
                        title: "Fullmetal Alchemist: Brotherhood",
                        ep: 12,
                        image: "https://picsum.photos/id/201/300/170",
                        progress: 30
                    }
                ];
                localStorage.setItem("watchHistory", JSON.stringify(demoHistory));
            }
        }

        // Main initialization
        async function init() {
            seedHistory();
            await loadHero();
            await loadTrending();
            await loadNewReleases();
            loadContinueWatching();
            setupKeyboard();

            // Custom cursor (optional)
            console.log("%cAnimeVault loaded successfully ✨", "color:#a855f7; font-size:13px");
        }

        // Boot the app
        window.onload = init;
    </script>
</body>
</html>
