<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Anime Streaming - Watch Sub & Dub in HD">
    <title>AetherAnime - Premium Anime Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --purple: #8b5cf6;
            --pink: #d946ef;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--bg);
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(18, 18, 24, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5),
                        0 0 40px rgba(217, 70, 239, 0.3);
        }
        
        .hero-bg {
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(11,11,15,0.95));
        }
        
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: scale(1.05) translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(139 92 246 / 0.4);
        }
        
        .nav-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(11, 11, 15, 0.95);
            backdrop-filter: blur(12px);
        }
        
        .anime-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .anime-card img {
            transition: transform 0.5s ease;
        }
        
        .anime-card:hover img {
            transform: scale(1.1);
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 15s linear infinite;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- HEADER -->
    <header class="nav-header border-b border-purple-500/20">
        <div class="max-w-screen-2xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Menu -->
                <button onclick="toggleSidebar()" 
                        class="text-3xl text-white hover:text-purple-400 transition-colors p-2">
                    <i class="fas fa-bars"></i>
                </button>
                
                <!-- Center: Logo -->
                <div class="flex items-center gap-3 absolute left-1/2 -translate-x-1/2">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center text-2xl font-bold">
                        A
                    </div>
                    <div>
                        <span class="text-2xl font-bold tracking-tighter">AETHER</span>
                        <span class="text-pink-400 text-2xl font-bold">ANIME</span>
                    </div>
                </div>
                
                <!-- Right: Search -->
                <button onclick="showSearchModal()" 
                        class="text-3xl text-white hover:text-purple-400 transition-colors p-2">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- SIDEBAR -->
    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#121218] border-r border-purple-500/30 transform -translate-x-full transition-transform duration-300 z-50 overflow-y-auto">
        <div class="p-6">
            <button onclick="toggleSidebar()" class="text-3xl mb-8">&times;</button>
            
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-500/10 text-white transition-colors">
                    <i class="fas fa-home w-5"></i>
                    <span>Home</span>
                </a>
                <a href="search.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-500/10 text-white transition-colors">
                    <i class="fas fa-search w-5"></i>
                    <span>Browse</span>
                </a>
                <a href="schedule.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-500/10 text-white transition-colors">
                    <i class="fas fa-calendar w-5"></i>
                    <span>Schedule</span>
                </a>
                <a href="creator.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-purple-500/10 text-white transition-colors">
                    <i class="fas fa-user w-5"></i>
                    <span>Creator</span>
                </a>
            </nav>
            
            <div class="mt-12">
                <h3 class="text-xs uppercase tracking-widest text-muted mb-4 px-4">Genres</h3>
                <div class="grid grid-cols-2 gap-2 text-sm" id="genre-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- HERO -->
    <div id="hero" class="hero-bg h-screen relative flex items-end">
        <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-transparent to-black/60"></div>
        
        <div class="max-w-screen-2xl mx-auto px-8 pb-20 relative z-10">
            <div class="max-w-md">
                <div id="hero-type" class="inline-flex items-center gap-2 bg-white/10 backdrop-blur px-4 py-1 rounded-full text-sm mb-4"></div>
                <h1 id="hero-title" class="text-6xl font-bold leading-none mb-4"></h1>
                <p id="hero-synopsis" class="text-gray-300 line-clamp-3 mb-6"></p>
                
                <div class="flex gap-4">
                    <button onclick="watchHero()" 
                            class="flex-1 bg-white text-black font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 hover:scale-105 transition">
                        <i class="fas fa-play"></i>
                        <span>WATCH NOW</span>
                    </button>
                    <button onclick="showMoreInfo()" 
                            class="flex-1 border border-white/70 font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-white/10 transition">
                        <i class="fas fa-info-circle"></i>
                        <span>MORE INFO</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Slider dots -->
        <div class="absolute bottom-10 right-10 flex gap-3 z-20" id="hero-dots">
            <!-- JS populated -->
        </div>
    </div>

    <!-- CONTINUE WATCHING -->
    <div class="max-w-screen-2xl mx-auto px-8 py-12">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-3xl font-bold">Continue Watching</h2>
            <button onclick="clearHistory()" class="text-sm text-purple-400 hover:text-pink-400">Clear</button>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="continue-grid">
            <!-- JS populated -->
        </div>
    </div>

    <!-- TRENDING -->
    <div class="max-w-screen-2xl mx-auto px-8 py-12 bg-[#121218]">
        <h2 class="text-3xl font-bold mb-6">Trending Now</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="trending-grid">
            <!-- JS populated -->
        </div>
    </div>

    <!-- NEW RELEASES -->
    <div class="max-w-screen-2xl mx-auto px-8 py-12">
        <h2 class="text-3xl font-bold mb-6">New Releases</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="new-grid">
            <!-- JS populated -->
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-black/50 border-t border-purple-500/20 py-12">
        <div class="max-w-screen-2xl mx-auto px-8 text-center">
            <div class="flex justify-center gap-8 text-3xl mb-8">
                <a href="#" class="hover:text-purple-400"><i class="fab fa-discord"></i></a>
                <a href="https://github.com" class="hover:text-purple-400"><i class="fab fa-github"></i></a>
            </div>
            <p class="text-muted">AetherAnime • Built with ❤️ for anime fans • Static on Cloudflare Pages</p>
            <p class="text-xs text-muted mt-2">Data from Jikan API • Streams via megaplay.buzz</p>
        </div>
    </footer>

    <!-- SEARCH MODAL -->
    <div id="search-modal" class="fixed inset-0 bg-black/90 hidden flex-col z-[100]">
        <div class="p-6">
            <div class="relative">
                <input id="search-input" 
                       onkeyup="liveSearch(this.value)"
                       type="text" 
                       placeholder="Search anime..." 
                       class="w-full bg-[#121218] border border-purple-500/30 rounded-3xl py-6 px-8 text-xl focus:outline-none focus:border-purple-500">
                <button onclick="hideSearchModal()" class="absolute right-8 top-1/2 -translate-y-1/2 text-3xl">✕</button>
            </div>
        </div>
        
        <div class="flex-1 overflow-auto px-6" id="search-results">
            <!-- JS populated -->
        </div>
    </div>

    <script>
        // Tailwind script already included
        function initTailwind() {
            // Already using CDN
        }
        
        // Global variables
        let currentHeroIndex = 0;
        let heroAnimes = [];
        let watchHistory = JSON.parse(localStorage.getItem('watchHistory') || '[]');
        
        // Jikan API Base
        const JIKAN_BASE = "https://api.jikan.moe/v4";
        
        // Sample trending IDs for demo (you can expand)
        const demoAnimeIds = [5114, 9253, 11061, 16498, 38000, 40716];
        
        async function fetchAnime(id) {
            try {
                const res = await fetch(`${JIKAN_BASE}/anime/${id}`);
                if (!res.ok) throw new Error('Failed');
                return await res.json();
            } catch(e) {
                console.error(e);
                return null;
            }
        }
        
        async function loadHero() {
            heroAnimes = [];
            for (let id of demoAnimeIds.slice(0, 5)) {
                const data = await fetchAnime(id);
                if (data && data.data) heroAnimes.push(data.data);
            }
            
            if (heroAnimes.length === 0) return;
            
            renderHero();
            setInterval(nextHero, 7000);
        }
        
        function renderHero() {
            const anime = heroAnimes[currentHeroIndex];
            if (!anime) return;
            
            document.getElementById('hero').style.backgroundImage = `url(${anime.images.jpg.large_image_url})`;
            document.getElementById('hero-title').textContent = anime.title_english || anime.title;
            document.getElementById('hero-synopsis').textContent = anime.synopsis ? anime.synopsis.substring(0, 180) + '...' : '';
            document.getElementById('hero-type').innerHTML = `
                ${anime.type} • ${anime.score ? anime.score + ' ★' : ''} • ${anime.episodes || '?'} EPS
            `;
            
            // Dots
            const dotsContainer = document.getElementById('hero-dots');
            dotsContainer.innerHTML = '';
            heroAnimes.forEach((_, i) => {
                const dot = document.createElement('button');
                dot.className = `w-3 h-3 rounded-full transition-all ${i === currentHeroIndex ? 'bg-purple-500 scale-125' : 'bg-white/50'}`;
                dot.onclick = () => {
                    currentHeroIndex = i;
                    renderHero();
                };
                dotsContainer.appendChild(dot);
            });
        }
        
        function nextHero() {
            currentHeroIndex = (currentHeroIndex + 1) % heroAnimes.length;
            renderHero();
        }
        
        function watchHero() {
            const anime = heroAnimes[currentHeroIndex];
            if (anime) {
                window.location.href = `watch.html?id=${anime.mal_id}&ep=1&type=sub`;
            }
        }
        
        async function loadSection(sectionId, endpoint, limit = 12) {
            const container = document.getElementById(sectionId);
            if (!container) return;
            
            container.innerHTML = '<div class="col-span-full text-center py-8"><i class="fas fa-spinner fa-spin text-4xl"></i></div>';
            
            try {
                let url = `${JIKAN_BASE}/${endpoint}`;
                if (endpoint.includes('top')) url += '?limit=' + limit;
                
                const res = await fetch(url);
                const data = await res.json();
                const animes = data.data || [];
                
                container.innerHTML = '';
                
                animes.forEach(anime => {
                    const card = createAnimeCard(anime);
                    container.appendChild(card);
                });
            } catch(e) {
                container.innerHTML = '<div class="col-span-full text-red-400">Failed to load</div>';
            }
        }
        
        function createAnimeCard(anime) {
            const div = document.createElement('div');
            div.className = `anime-card glass cursor-pointer overflow-hidden`;
            div.innerHTML = `
                <div class="relative">
                    <img src="${anime.images.jpg.large_image_url || anime.images.jpg.image_url}" 
                         class="w-full aspect-[9/13] object-cover" alt="${anime.title}">
                    <div class="absolute top-2 right-2 bg-black/70 text-xs px-2 py-1 rounded">
                        ${anime.score ? anime.score : '??'} ★
                    </div>
                    ${anime.episodes ? `<div class="absolute bottom-2 left-2 bg-black/70 text-xs px-2 py-1 rounded">${anime.episodes} EPS</div>` : ''}
                </div>
                <div class="p-3">
                    <h3 class="font-semibold line-clamp-2 text-sm leading-tight">${anime.title_english || anime.title}</h3>
                    <p class="text-xs text-purple-400 mt-1">${anime.type || 'TV'}</p>
                </div>
            `;
            div.onclick = () => {
                window.location.href = `anime.html?id=${anime.mal_id}`;
            };
            return div;
        }
        
        async function loadHome() {
            await loadHero();
            
            // Trending (Top)
            await loadSection('trending-grid', 'top/anime', 12);
            
            // New / Seasonal (using season)
            await loadSection('new-grid', 'seasons/now', 12);
            
            // Continue watching
            renderContinueWatching();
        }
        
        function renderContinueWatching() {
            const container = document.getElementById('continue-grid');
            if (!container) return;
            container.innerHTML = '';
            
            if (watchHistory.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-muted">No history yet. Start watching!</div>`;
                return;
            }
            
            watchHistory.slice(0, 6).forEach(item => {
                const div = document.createElement('div');
                div.className = 'glass rounded-2xl overflow-hidden cursor-pointer';
                div.innerHTML = `
                    <div class="relative">
                        <img src="${item.image}" class="w-full aspect-video object-cover">
                        <div class="absolute bottom-0 left-0 right-0 h-1 bg-purple-500" style="width: ${item.progress || 45}%"></div>
                    </div>
                    <div class="p-3 text-sm">
                        <div class="line-clamp-1">${item.title}</div>
                        <div class="text-purple-400 text-xs">Ep ${item.ep}</div>
                    </div>
                `;
                div.onclick = () => {
                    window.location.href = `watch.html?id=${item.id}&ep=${item.ep}&type=${item.type || 'sub'}`;
                };
                container.appendChild(div);
            });
        }
        
        function saveToHistory(animeId, title, ep, image, type = 'sub') {
            let history = JSON.parse(localStorage.getItem('watchHistory') || '[]');
            
            // Remove if already exists
            history = history.filter(h => h.id !== animeId);
            
            history.unshift({
                id: animeId,
                title: title,
                ep: ep,
                image: image,
                type: type,
                progress: 65,
                timestamp: Date.now()
            });
            
            // Keep only last 30
            history = history.slice(0, 30);
            localStorage.setItem('watchHistory', JSON.stringify(history));
        }
        
        function clearHistory() {
            if (confirm('Clear watch history?')) {
                localStorage.removeItem('watchHistory');
                renderContinueWatching();
            }
        }
        
        // Search
        let searchTimeout;
        async function liveSearch(query) {
            clearTimeout(searchTimeout);
            if (query.length < 2) {
                document.getElementById('search-results').innerHTML = '';
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${JIKAN_BASE}/anime?q=${encodeURIComponent(query)}&limit=20`);
                    const data = await res.json();
                    const resultsDiv = document.getElementById('search-results');
                    resultsDiv.innerHTML = '';
                    
                    if (data.data && data.data.length) {
                        data.data.forEach(anime => {
                            const item = document.createElement('div');
                            item.className = "flex gap-4 p-4 border-b border-white/10 hover:bg-white/5 cursor-pointer";
                            item.innerHTML = `
                                <img src="${anime.images.jpg.image_url}" class="w-16 h-24 object-cover rounded">
                                <div>
                                    <h4 class="font-medium">${anime.title}</h4>
                                    <p class="text-xs text-muted">${anime.type} • ${anime.episodes || '?'} eps</p>
                                    <p class="text-xs line-clamp-2 mt-2">${anime.synopsis ? anime.synopsis.substring(0,120) : ''}</p>
                                </div>
                            `;
                            item.onclick = () => {
                                hideSearchModal();
                                window.location.href = `anime.html?id=${anime.mal_id}`;
                            };
                            resultsDiv.appendChild(item);
                        });
                    } else {
                        resultsDiv.innerHTML = `<div class="p-8 text-center text-muted">No results found</div>`;
                    }
                } catch(e) {}
            }, 400);
        }
        
        function showSearchModal() {
            document.getElementById('search-modal').classList.remove('hidden');
            document.getElementById('search-modal').classList.add('flex');
            setTimeout(() => {
                document.getElementById('search-input').focus();
            }, 300);
        }
        
        function hideSearchModal() {
            document.getElementById('search-modal').classList.add('hidden');
            document.getElementById('search-modal').classList.remove('flex');
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }
        
        function showMoreInfo() {
            const anime = heroAnimes[currentHeroIndex];
            if (anime) window.location.href = `anime.html?id=${anime.mal_id}`;
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.getElementById('search-modal').classList.contains('hidden')) {
                e.preventDefault();
                showSearchModal();
            }
            if (e.key === 'Escape') {
                hideSearchModal();
            }
        });
        
        // Initialize
        window.onload = () => {
            loadHome();
            
            // Populate some genres
            const genres = ['Action', 'Adventure', 'Comedy', 'Drama', 'Fantasy', 'Horror', 'Romance', 'Sci-Fi'];
            const genreList = document.getElementById('genre-list');
            genres.forEach(g => {
                const el = document.createElement('div');
                el.className = "px-4 py-2 bg-white/5 hover:bg-purple-500/20 rounded-2xl text-center cursor-pointer transition";
                el.textContent = g;
                genreList.appendChild(el);
            });
            
            // PWA / Service Worker simulation
            console.log('%cAetherAnime loaded successfully ✨', 'color:#c026d3; font-size:14px');
        };
        
        // Expose some functions globally
        window.toggleSidebar = toggleSidebar;
        window.showSearchModal = showSearchModal;
        window.hideSearchModal = hideSearchModal;
        window.watchHero = watchHero;
        window.showMoreInfo = showMoreInfo;
        window.clearHistory = clearHistory;
        window.liveSearch = liveSearch;
    </script>
</body>
</html>
