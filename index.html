<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AnimeStream — Premium Anime Hub</title>
  <meta name="description" content="Stream anime instantly with premium UI. Watch sub/dub, continue watching, personalized history — all free.">
  <meta name="theme-color" content="#0b0b0f">
  
  <!-- OpenGraph & Twitter -->
  <meta property="og:title" content="AnimeStream">
  <meta property="og:description" content="Cinematic anime streaming platform. Watch latest episodes in HD.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  
  <!-- PWA + manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" href="favicon.ico">
  
  <!-- Swiper for hero slider & AOS for scroll animations -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  
  <!-- Core CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <div class="neon-loader"></div>
    <p>loading cinematic experience...</p>
  </div>
  
  <!-- SITE HEADER with left menu, centered logo, right search -->
  <header class="navbar">
    <div class="nav-container">
      <button id="menuToggle" class="nav-icon menu-btn" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
      
      <a href="index.html" class="logo-area">
        <div class="logo-icon">
          <i class="fas fa-play-circle"></i>
        </div>
        <span class="logo-text">Anime<span>Stream</span></span>
      </a>
      
      <button id="searchTrigger" class="nav-icon search-trigger" aria-label="Search">
        <i class="fas fa-search"></i>
      </button>
    </div>
  </header>
  
  <!-- SIDEBAR (mobile/desktop drawer) -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon"><i class="fas fa-tv"></i></div>
      <span>Menu</span>
      <button id="closeSidebar" class="close-sidebar"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="search.html"><i class="fas fa-search"></i> Explore</a>
      <a href="schedule.html"><i class="fas fa-calendar-week"></i> Schedule</a>
      <a href="#" id="randomAnimeBtn"><i class="fas fa-dice-d6"></i> Random Anime</a>
      <a href="creator.html"><i class="fas fa-code-branch"></i> Creator</a>
    </nav>
    <div class="sidebar-footer">
      <div class="neon-glow"></div>
      <p>© AnimeStream — binge culture</p>
    </div>
  </aside>
  
  <!-- FULLSCREEN SEARCH OVERLAY (mobile & desktop) -->
  <div id="searchOverlay" class="search-overlay">
    <div class="search-overlay-container">
      <div class="search-header">
        <i class="fas fa-search"></i>
        <input type="text" id="overlaySearchInput" placeholder="Search anime... (Naruto, One Piece, ...)" autocomplete="off">
        <button id="closeSearchOverlay"><i class="fas fa-times"></i></button>
      </div>
      <div id="liveSearchResults" class="live-search-results"></div>
    </div>
  </div>
  
  <main id="app-content">
    <!-- DYNAMIC HOME CONTENT (loaded via JS) -->
    <div id="dynamicHome"></div>
  </main>
  
  <!-- scripts -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/home.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    // initial load
    window.addEventListener('DOMContentLoaded', async () => {
      AOS.init({ duration: 800, once: true });
      setTimeout(() => {
        document.getElementById('loading-screen')?.classList.add('fade-out');
      }, 500);
      if(window.initHomePage) await window.initHomePage();
    });
  </script>
  
  <!-- service worker registration for PWA -->
  <script>
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log("SW error:", err));
    }
  </script>
</body>
</html>
