<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="watch-title">Watching...</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .player-container { aspect-ratio: 16/9; background: #000; }
    </style>
</head>
<body class="bg-black text-white">
    <div class="max-w-screen-2xl mx-auto">
        <!-- Player -->
        <div class="player-container relative" id="player-wrapper">
            <iframe id="video-player" class="w-full h-full" frameborder="0" allow="fullscreen" allowfullscreen></iframe>
        </div>

        <div class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Episode Info + List -->
            <div class="lg:col-span-8">
                <h1 id="anime-title" class="text-3xl font-bold"></h1>
                <p id="current-ep" class="text-purple-400 mt-1"></p>

                <div class="mt-8">
                    <h3 class="font-semibold mb-4">Episodes</h3>
                    <div id="episode-list" class="max-h-96 overflow-auto grid grid-cols-6 gap-3 pr-4"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-4">
                <div class="glass rounded-3xl p-6">
                    <h3 class="font-semibold mb-4">Servers</h3>
                    <div class="flex gap-3">
                        <button onclick="switchType('sub')" id="sub-btn"
                                class="flex-1 py-4 rounded-2xl bg-purple-600">SUB</button>
                        <button onclick="switchType('dub')" id="dub-btn"
                                class="flex-1 py-4 rounded-2xl bg-white/10">DUB</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const malId = params.get('id');
        let currentEp = parseInt(params.get('ep')) || 1;
        let currentType = params.get('type') || 'sub';

        async function loadWatchPage() {
            const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
            const { data } = await res.json();

            document.getElementById('watch-title').textContent = `${data.title} - Episode ${currentEp}`;
            document.getElementById('anime-title').textContent = data.title;
            document.getElementById('current-ep').textContent = `Episode ${currentEp} • ${currentType.toUpperCase()}`;

            // Load Player
            const streamUrl = `https://megaplay.buzz/stream/mal/${malId}/${currentEp}/${currentType}`;
            document.getElementById('video-player').src = streamUrl;

            // Episode List
            const container = document.getElementById('episode-list');
            container.innerHTML = '';
            for (let i = 1; i <= (data.episodes || 24); i++) {
                const active = i === currentEp ? 'ring-2 ring-purple-500' : '';
                const btn = document.createElement('button');
                btn.className = `py-6 text-center rounded-2xl bg-white/5 hover:bg-white/10 transition-all ${active}`;
                btn.textContent = i;
                btn.onclick = () => {
                    currentEp = i;
                    loadWatchPage();
                };
                container.appendChild(btn);
            }
        }

        function switchType(type) {
            currentType = type;
            loadWatchPage();
        }

        window.onload = loadWatchPage;
    </script>
</body>
</html>
