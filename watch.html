<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeStream - Watch Anime Online Free</title>
    <style>
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --bg-tertiary: #1a1a24;
            --purple: #8b5cf6;
            --pink: #d946ef;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --border: #1f1f2e;
            --card-bg: #16161f;
            --card-hover: #1e1e2a;
            --glow-purple: rgba(139, 92, 246, 0.4);
            --glow-pink: rgba(217, 70, 239, 0.35);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
            --transition: 0.3s ease;
            --navbar-height: 62px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:8px; }
        .navbar {
            position: sticky; top:0; z-index:1000; display:flex; align-items:center;
            height:var(--navbar-height); padding:0 16px;
            background: rgba(18,18,24,0.75); backdrop-filter: blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.06); gap:12px;
        }
        .nav-left, .nav-right { display:flex; align-items:center; gap:8px; z-index:1001; }
        .nav-center { position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; }
        .nav-logo {
            width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--purple),var(--pink));
            display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff;
            text-decoration:none; box-shadow:0 0 16px var(--glow-purple);
        }
        .nav-title span { background:linear-gradient(135deg,var(--purple),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .icon-btn {
            width:40px; height:40px; border-radius:50%; border:none; background:var(--bg-tertiary);
            color:var(--text); cursor:pointer; font-size:1.2rem; transition:var(--transition);
        }
        .icon-btn:hover { background:var(--card-hover); color:var(--purple); }
        .sidebar-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);
            z-index:998; opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .sidebar-overlay.active { opacity:1; pointer-events:auto; }
        .sidebar {
            position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--bg-secondary);
            z-index:999; padding:20px; transition:left 0.35s; overflow-y:auto;
            display:flex; flex-direction:column; gap:6px; border-right:1px solid var(--border);
        }
        .sidebar.active { left:0; }
        .sidebar-link {
            display:flex; align-items:center; gap:12px; padding:12px; border-radius:var(--radius-sm);
            color:var(--text); text-decoration:none; font-weight:500; transition:var(--transition);
        }
        .sidebar-link:hover, .sidebar-link.active { background:var(--card-hover); color:var(--purple); }
        .search-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85);
            backdrop-filter:blur(16px); z-index:2000; display:flex; flex-direction:column;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .search-overlay.active { opacity:1; pointer-events:auto; }
        .search-overlay-inner { max-width:700px; width:100%; margin:20px auto; padding:16px; }
        .search-input-wrap {
            display:flex; align-items:center; gap:10px; background:var(--bg-secondary);
            border-radius:var(--radius); padding:6px 16px; border:2px solid var(--border);
        }
        .search-input-wrap input {
            flex:1; background:none; border:none; color:var(--text); font-size:1.1rem; padding:12px 0; outline:none;
        }
        .main-content { max-width:1400px; margin:0 auto; padding:16px; }
        .page { display:none; }
        .page.active { display:block; }
        .hero-slider {
            position:relative; border-radius:var(--radius); overflow:hidden; height:420px;
            margin-bottom:24px; background:var(--bg-secondary);
        }
        .hero-slide {
            position:absolute; top:0; left:0; width:100%; height:100%; opacity:0;
            transition:opacity 0.7s; display:flex; align-items:flex-end; padding:30px;
            background-size:cover; background-position:center;
        }
        .hero-slide.active { opacity:1; }
        .hero-slide::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.4) 50%);
        }
        .hero-info { position:relative; z-index:2; }
        .hero-info h2 { font-size:2rem; font-weight:800; }
        .btn {
            display:inline-flex; align-items:center; gap:8px; padding:10px 22px; border-radius:30px;
            font-weight:600; text-decoration:none; border:none; cursor:pointer; transition:var(--transition);
        }
        .btn-primary { background:linear-gradient(135deg,var(--purple),var(--pink)); color:#fff; }
        .btn-secondary { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); }
        .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:14px; }
        .anime-card {
            position:relative; border-radius:var(--radius); overflow:hidden;
            background:var(--card-bg); transition:var(--transition); cursor:pointer; text-decoration:none; color:var(--text);
            box-shadow:0 2px 8px rgba(0,0,0,0.3); border:1px solid transparent;
        }
        .anime-card:hover { transform:translateY(-4px); border-color:rgba(139,92,246,0.3); }
        .poster-wrap { aspect-ratio:3/4; overflow:hidden; background:var(--bg-tertiary); }
        .poster-wrap img { width:100%; height:100%; object-fit:cover; }
        .card-info { padding:10px; }
        .card-title { font-weight:600; font-size:0.85rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .loader-ring {
            width:48px; height:48px; border:3px solid var(--border); border-top-color:var(--purple);
            border-radius:50%; animation:spin 0.8s linear infinite; margin:40px auto;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .watch-container { display:grid; grid-template-columns:1fr 340px; gap:16px; }
        @media(max-width:1000px){ .watch-container { grid-template-columns:1fr; } }
        .player-wrapper { aspect-ratio:16/9; background:#000; border-radius:var(--radius); overflow:hidden; }
        .player-wrapper iframe { width:100%; height:100%; border:none; }
        .ep-sidebar { background:var(--card-bg); border-radius:var(--radius); padding:14px; max-height:70vh; overflow-y:auto; }
        .ep-sidebar-item { display:block; padding:8px 12px; border-radius:var(--radius-sm); color:var(--text); text-decoration:none; }
        .ep-sidebar-item.active, .ep-sidebar-item:hover { background:var(--purple); color:#fff; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-left"><button class="icon-btn" id="menuBtn">☰</button></div>
        <div class="nav-center"><a href="?page=home" class="nav-logo">A</a><span class="nav-title"><span>Anime</span>Stream</span></div>
        <div class="nav-right"><button class="icon-btn" id="searchBtn">🔍</button></div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav class="sidebar" id="sidebar">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <strong>AnimeStream</strong><button class="icon-btn" id="closeSidebar">✕</button>
        </div>
        <a href="?page=home" class="sidebar-link" data-page="home">🏠 Home</a>
        <a href="?page=search" class="sidebar-link" data-page="search">🔍 Search</a>
        <a href="?page=schedule" class="sidebar-link" data-page="schedule">📅 Schedule</a>
        <a href="?page=creator" class="sidebar-link" data-page="creator">👤 Creator</a>
    </nav>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-overlay-inner">
            <div style="display:flex;justify-content:flex-end;"><button class="icon-btn" id="closeSearch">✕</button></div>
            <div class="search-input-wrap"><span>🔍</span><input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off"></div>
            <div id="searchResults" style="max-height:70vh;overflow-y:auto;"></div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="page active" id="page-home"></div>
        <div class="page" id="page-anime"></div>
        <div class="page" id="page-watch"></div>
        <div class="page" id="page-search"></div>
        <div class="page" id="page-schedule"></div>
        <div class="page" id="page-creator"></div>
    </main>

    <script>
        // ==================== CONFIG & UTILS ====================
        const C = {
            JIKAN: 'https://api.jikan.moe/v4',
            STREAM: 'https://megaplay.buzz/stream/mal',
            CACHE: 'as_',
        };
        const $ = (s, c = document) => c.querySelector(s);
        const $$ = (s, c = document) => [...c.querySelectorAll(s)];
        const getParam = (p) => new URLSearchParams(location.search).get(p);
        const cache = (k, d, t = 3600000) => { try { localStorage.setItem(C.CACHE + k, JSON.stringify({ d, ts: Date.now(),
                t })); } catch {} };
        const cacheGet = (k) => { try { const v = localStorage.getItem(C.CACHE + k); if (v) { const o = JSON.parse(v); if (
                    Date.now() - o.ts < o.t) return o.d; } } catch {} return null; };

        // ==================== API ====================
        async function api(url) {
            const ck = `jikan_${url.replace(/[^a-z0-9]/g,'_')}`;
            const cached = cacheGet(ck);
            if (cached) return cached;
            try {
                const res = await fetch(C.JIKAN + url);
                if (res.status === 429) { await new Promise(r => setTimeout(r, 1500)); return api(url); }
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();
                cache(ck, data, 300000);
                return data;
            } catch (e) { console.warn(e); return null; }
        }
        const getAnime = id => api(`/anime/${id}/full`);
        const getEpisodes = id => api(`/anime/${id}/episodes`);
        const getTop = (page = 1, filter = 'bypopularity') => api(`/top/anime?page=${page}&filter=${filter}&limit=24`);
        const getSeasonNow = () => api('/seasons/now?limit=24');
        const getSeasonUpcoming = () => api('/seasons/upcoming?limit=12');
        const searchAnime = (q, page = 1) => api(`/anime?q=${encodeURIComponent(q)}&page=${page}&limit=24&sfw=true`);

        // ==================== STORAGE ====================
        const getHistory = () => cacheGet('history') || [];
        const addHistory = (id, ep, type, title, poster) => {
            let h = getHistory();
            h = h.filter(e => !(e.id == id && e.ep == ep && e.type == type));
            h.unshift({ id, ep, type, title, poster, ts: Date.now() });
            if (h.length > 50) h = h.slice(0, 50);
            cache('history', h, 86400000 * 30);
        };

        // ==================== RENDER ====================
        function animeCard(a, showEp = false) {
            const id = a.mal_id;
            const title = a.title_english || a.title;
            const poster = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
            const eps = a.episodes || '?';
            return `
            <a href="?page=anime&id=${id}" class="anime-card">
              <div class="poster-wrap">
                <img src="${poster}" alt="" loading="lazy" onerror="this.style.display='none'">
                <span style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);padding:3px 8px;border-radius:14px;font-size:0.7rem;color:#fbbf24;">⭐ ${a.score||'?'}</span>
                ${showEp && eps!=='?' ? `<span style="position:absolute;bottom:8px;left:8px;background:var(--purple);padding:3px 8px;border-radius:10px;font-size:0.68rem;">${eps} eps</span>` : ''}
                <button class="btn btn-primary" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;padding:0;justify-content:center;opacity:0;transition:opacity 0.3s;" onclick="event.preventDefault();event.stopPropagation();window.location.href='?page=watch&id=${id}&ep=1&type=sub'">▶</button>
              </div>
              <div class="card-info"><span class="card-title">${title}</span></div>
            </a>`;
        }

        function grid(id, list, badge) {
            const el = $(id);
            if (!el) return;
            el.innerHTML = list?.length ? list.map(a => animeCard(a, badge)).join('') :
                '<p style="color:var(--muted);text-align:center;padding:20px;">Nothing here</p>';
        }

        // ==================== PAGES ====================
        function showPage(name) {
            $$('.page').forEach(p => p.classList.remove('active'));
            const page = $(`#page-${name}`);
            if (page) page.classList.add('active');
            $$('.sidebar-link').forEach(l => l.classList.remove('active'));
            const link = $(`.sidebar-link[data-page="${name}"]`);
            if (link) link.classList.add('active');
        }

        async function loadHome() {
            showPage('home');
            const home = $('#page-home');
            home.innerHTML = '<div class="loader-ring"></div>';
            const [top, now, upcoming] = await Promise.all([getTop(), getSeasonNow(), getSeasonUpcoming()]);
            home.innerHTML = `
            <div class="hero-slider" id="heroSlider"></div>
            <h2 style="margin:16px 0;">🔥 Trending</h2><div class="card-grid" id="trendingGrid"></div>
            <h2 style="margin:16px 0;">🆕 Latest Updates</h2><div class="card-grid" id="latestGrid"></div>
            <h2 style="margin:16px 0;">⭐ Popular</h2><div class="card-grid" id="popularGrid"></div>
            <h2 style="margin:16px 0;">📅 Upcoming</h2><div class="card-grid" id="upcomingGrid"></div>
          `;
            if (top?.data) {
                grid('#trendingGrid', top.data.slice(0, 12), true);
                grid('#popularGrid', top.data.slice(6, 18), true);
            }
            if (now?.data) grid('#latestGrid', now.data.slice(0, 12), true);
            if (upcoming?.data) grid('#upcomingGrid', upcoming.data.slice(0, 8), false);
            // Hero
            const heroIds = [5114, 9253, 32281, 16498];
            const heroData = [];
            for (const id of heroIds) { const r = await getAnime(id); if (r?.data) heroData.push(r.data); }
            if (!heroData.length && top?.data) heroData.push(...top.data.slice(0, 3));
            const slider = $('#heroSlider');
            slider.innerHTML = '';
            heroData.forEach((a, i) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide${i===0?' active':''}`;
                slide.style.backgroundImage = `url(${a.images?.jpg?.large_image_url||''})`;
                slide.innerHTML = `<div class="hero-info"><h2>${a.title_english||a.title}</h2><a href="?page=anime&id=${a.mal_id}" class="btn btn-primary">▶ Watch Now</a></div>`;
                slider.appendChild(slide);
            });
            let cur = 0;
            setInterval(() => { cur = (cur + 1) % heroData.length;
                $$('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === cur)); }, 5000);
        }

        async function loadAnime(id) {
            showPage('anime');
            const page = $('#page-anime');
            page.innerHTML = '<div class="loader-ring"></div>';
            const [animeRes, epsRes] = await Promise.all([getAnime(id), getEpisodes(id)]);
            const anime = animeRes?.data;
            if (!anime) { page.innerHTML = '<p style="text-align:center;padding:40px;">Anime not found.</p>'; return; }
            const episodes = epsRes?.data || [];
            page.innerHTML = `
            <div style="display:flex;gap:20px;flex-wrap:wrap;">
              <img src="${anime.images?.jpg?.large_image_url||''}" style="width:200px;border-radius:var(--radius);">
              <div style="flex:1;">
                <h1>${anime.title_english||anime.title}</h1>
                <p style="color:var(--muted);">${anime.synopsis?.slice(0,300)||''}...</p>
                <div style="display:flex;gap:8px;margin:12px 0;">
                  <a href="?page=watch&id=${id}&ep=1&type=sub" class="btn btn-primary">▶ Watch Sub</a>
                  <a href="?page=watch&id=${id}&ep=1&type=dub" class="btn btn-secondary">🎙 Watch Dub</a>
                </div>
                <div style="margin-top:16px;">
                  <strong>Episodes:</strong>
                  <div style="max-height:300px;overflow-y:auto;">${episodes.map(e=>`<a href="?page=watch&id=${id}&ep=${e.mal_id||1}&type=sub" style="display:block;padding:6px 0;border-bottom:1px solid var(--border);color:var(--text);">Episode ${e.mal_id||1}</a>`).join('')}</div>
                </div>
              </div>
            </div>`;
        }

        async function loadWatch(id, ep, type) {
            showPage('watch');
            const page = $('#page-watch');
            page.innerHTML = '<div class="loader-ring"></div>';
            try {
                const [animeRes, epsRes] = await Promise.all([getAnime(id), getEpisodes(id)]);
                const anime = animeRes?.data;
                if (!anime) { page.innerHTML = '<p style="text-align:center;padding:40px;">Anime not found.</p>'; return; }
                const allEps = epsRes?.data || [];
                const totalEps = anime.episodes || allEps.length || 1;
                const stream = `${C.STREAM}/${id}/${ep}/${type}`;
                const title = anime.title_english || anime.title;
                addHistory(parseInt(id), parseInt(ep), type, title, anime.images?.jpg?.image_url || '');
                let epList = '';
                for (let i = 1; i <= Math.min(totalEps, 50); i++) {
                    epList +=
                        `<a href="?page=watch&id=${id}&ep=${i}&type=${type}" class="ep-sidebar-item${i===parseInt(ep)?' active':''}">Episode ${i}</a>`;
                }
                page.innerHTML = `
                <div class="watch-container">
                  <div>
                    <div class="player-wrapper"><iframe src="${stream}" allowfullscreen></iframe></div>
                    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
                      <strong>${title} Ep ${ep}</strong>
                      <button class="btn btn-secondary" onclick="location.href='?page=watch&id=${id}&ep=${ep}&type=${type==='sub'?'dub':'sub'}'">Switch to ${type==='sub'?'DUB':'SUB'}</button>
                    </div>
                    <div style="margin-top:8px;display:flex;gap:8px;">
                      ${parseInt(ep)>1?`<a href="?page=watch&id=${id}&ep=${parseInt(ep)-1}&type=${type}" class="btn btn-secondary">← Prev</a>`:''}
                      ${parseInt(ep)<totalEps?`<a href="?page=watch&id=${id}&ep=${parseInt(ep)+1}&type=${type}" class="btn btn-primary">Next →</a>`:''}
                    </div>
                  </div>
                  <div class="ep-sidebar"><h3>📺 Episodes</h3>${epList}</div>
                </div>`;
            } catch (e) {
                page.innerHTML = `<div style="text-align:center;padding:40px;"><p>Failed to load the watch page. The anime may be unavailable.</p><button class="btn btn-primary" onclick="history.back()">Go Back</button></div>`;
            }
        }

        async function loadSearch(q = '') {
            showPage('search');
            const page = $('#page-search');
            page.innerHTML = `
            <div class="search-input-wrap" style="margin-bottom:20px;"><input type="text" id="searchPageInput" placeholder="Search anime..." value="${q}"></div>
            <div class="card-grid" id="searchGrid"></div>
            <button class="btn btn-secondary" id="loadMore" style="display:none;margin:16px auto;">Load More</button>`;
            let pageNum = 1;
            async function doSearch(query, page = 1, append = false) {
                const res = await searchAnime(query, page);
                const grid = $('#searchGrid');
                if (!append) grid.innerHTML = '';
                if (res?.data?.length) {
                    res.data.forEach(a => grid.insertAdjacentHTML('beforeend', animeCard(a, true)));
                    $('#loadMore').style.display = res.pagination?.has_next_page ? 'block' : 'none';
                } else if (!append) grid.innerHTML = '<p style="color:var(--muted);text-align:center;">No results</p>';
            }
            if (q) doSearch(q);
            $('#searchPageInput').addEventListener('input', function() {
                const v = this.value;
                if (v.length >= 2) { pageNum = 1;
                    doSearch(v); }
            });
            $('#loadMore').addEventListener('click', () => { pageNum++;
                doSearch($('#searchPageInput').value, pageNum, true); });
        }

        async function loadSchedule() {
            showPage('schedule');
            const page = $('#page-schedule');
            page.innerHTML = '<div class="loader-ring"></div>';
            const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
            const all = await Promise.all(days.map(d => api(`/schedules?filter=${d}&limit=6&sfw=true`)));
            page.innerHTML = '<div class="card-grid" id="schedGrid"></div>';
            const grid = $('#schedGrid');
            days.forEach((d, i) => {
                const card = document.createElement('div');
                card.style.cssText =
                    'background:var(--card-bg);border-radius:var(--radius);padding:14px;border:1px solid var(--border);';
                card.innerHTML = `<h3 style="color:var(--purple);">${d.charAt(0).toUpperCase()+d.slice(1)}</h3>`;
                (all[i]?.data || []).forEach(a => {
                    const item = document.createElement('div');
                    item.style.cssText =
                        'display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;';
                    item.innerHTML =
                        `<img src="${a.images?.jpg?.image_url||''}" style="width:36px;height:48px;border-radius:6px;object-fit:cover;"><div><strong>${a.title_english||a.title}</strong><br><span style="color:var(--muted);font-size:0.7rem;">⭐${a.score||'?'}</span></div>`;
                    item.addEventListener('click', () => location.href =
                        `?page=anime&id=${a.mal_id}`);
                    card.appendChild(item);
                });
                grid.appendChild(card);
            });
        }

        function loadCreator() {
            showPage('creator');
            $('#page-creator').innerHTML = `
            <div style="max-width:500px;margin:0 auto;text-align:center;background:var(--card-bg);border-radius:var(--radius);padding:28px;">
              <div class="nav-logo" style="margin:0 auto 14px;width:90px;height:90px;font-size:2.2rem;">A</div>
              <h2>AnimeStream Creator</h2>
              <p style="color:var(--muted);">Version 1.0 · Built with 💜</p>
              <div style="margin-top:14px;"><a href="https://github.com" target="_blank" class="btn btn-primary">💻 GitHub</a></div>
            </div>`;
        }

        // ==================== ROUTER ====================
        function route() {
            const page = getParam('page') || 'home';
            const id = getParam('id');
            const ep = getParam('ep');
            const type = getParam('type') || 'sub';
            const q = getParam('q');
            if (page === 'anime' && id) loadAnime(id);
            else if (page === 'watch' && id && ep) loadWatch(id, ep, type);
            else if (page === 'search') loadSearch(q);
            else if (page === 'schedule') loadSchedule();
            else if (page === 'creator') loadCreator();
            else loadHome();
        }

        // ==================== UI EVENTS ====================
        document.getElementById('menuBtn').onclick = () => {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('sidebarOverlay').classList.add('active');
        };
        document.getElementById('closeSidebar').onclick = () => {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
        };
        document.getElementById('sidebarOverlay').onclick = () => {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
        };
        document.getElementById('searchBtn').onclick = () => {
            document.getElementById('searchOverlay').classList.add('active');
            document.getElementById('searchInput').focus();
        };
        document.getElementById('closeSearch').onclick = () => {
            document.getElementById('searchOverlay').classList.remove('active');
        };
        document.getElementById('searchInput').addEventListener('input', function() {
            const q = this.value;
            const resDiv = document.getElementById('searchResults');
            if (q.length < 2) { resDiv.innerHTML = ''; return; }
            resDiv.innerHTML = '<p style="color:var(--muted);text-align:center;">Searching...</p>';
            searchAnime(q, 1).then(r => {
                resDiv.innerHTML = '';
                if (r?.data?.length) {
                    r.data.slice(0, 8).forEach(a => {
                        resDiv.innerHTML +=
                            `<a href="?page=anime&id=${a.mal_id}" class="search-result-item" style="display:flex;gap:12px;padding:10px;color:var(--text);text-decoration:none;border-radius:8px;"><img src="${a.images?.jpg?.image_url||''}" style="width:48px;height:64px;border-radius:8px;object-fit:cover;"><div><strong>${a.title_english||a.title}</strong><br><span style="color:var(--muted);">⭐${a.score||'?'}</span></div></a>`;
                    });
                } else { resDiv.innerHTML = '<p style="color:var(--muted);">No results</p>'; }
            });
        });

        // Start
        window.addEventListener('popstate', route);
        document.addEventListener('DOMContentLoaded', route);
    </script>
</body>
</html>
