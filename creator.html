<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnimeStream Creator">
    <title>Creator - AnimeStream</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <style>
        :root {
            --bg: #0b0b0f; --bg-secondary: #121218; --bg-tertiary: #1a1a24;
            --purple: #8b5cf6; --pink: #d946ef; --text: #f3f4f6; --muted: #9ca3af;
            --border: rgba(255,255,255,0.08); --card-radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; display: flex; flex-direction: column; align-items: center; padding: 80px 20px 40px; }
        .glass-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: var(--card-radius); padding: 32px; max-width: 500px; width: 100%; text-align: center;
            box-shadow: 0 0 40px rgba(139,92,246,0.1);
        }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--pink));
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
        }
        h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; background: var(--purple); color: #fff; font-size: 0.8rem; margin: 8px 0; }
        .social-links { display: flex; gap: 12px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .social-btn {
            padding: 10px 20px; border-radius: 24px; background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text); text-decoration: none; font-size: 0.9rem; transition: 0.2s;
        }
        .social-btn:hover { background: var(--purple); border-color: var(--purple); }
        .version { color: var(--muted); font-size: 0.8rem; margin-top: 20px; }
        a { color: var(--purple); }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="avatar">👤</div>
        <h1>AnimeStream Creator</h1>
        <span class="badge">v1.0.0</span>
        <p style="color:var(--muted);margin:12px 0;">Premium anime streaming platform built with vanilla HTML, CSS, and JavaScript. Powered by Jikan API and Cloudflare.</p>
        <div class="social-links">
            <a href="https://github.com" target="_blank" class="social-btn">🐙 GitHub</a>
            <a href="https://discord.com" target="_blank" class="social-btn">💬 Discord</a>
            <a href="mailto:creator@example.com" class="social-btn">✉️ Email</a>
        </div>
        <div class="version">
            <p>Project open-source on <a href="https://github.com" target="_blank">GitHub</a></p>
            <p>Made with ❤️ for anime fans</p>
            <p style="margin-top:12px;">© 2025 AnimeStream</p>
        </div>
    </div>
</body>
</html>
