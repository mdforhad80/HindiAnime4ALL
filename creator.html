<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AnimeStream — Premium Anime Streaming</title>
    <meta name="description" content="Stream the latest and greatest anime in HD. Premium anime streaming platform with cinematic UI." />
    <meta name="theme-color" content="#0b0b0f" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎬%3C/text%3E%3C/svg%3E" />
    <meta property="og:title" content="AnimeStream — Premium Anime Streaming" />
    <meta property="og:description" content="Stream the latest and greatest anime in HD. Premium anime streaming platform with cinematic UI." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AnimeStream — Premium Anime Streaming" />
    <meta name="twitter:description" content="Stream the latest and greatest anime in HD. Premium anime streaming platform with cinematic UI." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
                   CSS VARIABLES & RESET
                   ============================================================ */
        :root {
            --bg: #0b0b0f;
            --bg-secondary: #121218;
            --bg-card: #1a1a24;
            --purple: #8b5cf6;
            --pink: #d946ef;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --glow: 0 0 40px rgba(139, 92, 246, 0.15);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --header-h: 64px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            padding-top: var(--header-h);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--purple);
            border-radius: 12px;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        img {
            max-width: 100%;
            display: block;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }
        input {
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
            color: inherit;
        }

        /* ============================================================
                   LOADING SCREEN
                   ============================================================ */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loader .spinner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 4px solid rgba(139, 92, 246, 0.15);
            border-top-color: var(--purple);
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }
        #loader p {
            color: var(--muted);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
                   CURSOR GLOW
                   ============================================================ */
        #cursor-glow {
            position: fixed;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            will-change: transform;
        }
        @media (max-width: 768px) {
            #cursor-glow {
                display: none;
            }
        }

        /* ============================================================
                   PARTICLES CANVAS
                   ============================================================ */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ============================================================
                   HEADER / NAVBAR
                   ============================================================ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--header-h);
            background: rgba(11, 11, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            transition: background var(--transition);
        }
        .header.scrolled {
            background: rgba(11, 11, 15, 0.96);
        }

        /* Left: Hamburger */
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
            min-width: 44px;
        }
        .hamburger {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 8px;
            transition: background var(--transition);
            background: transparent;
            border: none;
        }
        .hamburger:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text);
            border-radius: 4px;
            transition: var(--transition);
            transform-origin: center;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* Center: Logo + Title */
        .header-center {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1 1 auto;
            justify-content: center;
            min-width: 0;
        }
        .header-logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-logo .emoji {
            -webkit-text-fill-color: initial;
            font-size: 1.3rem;
        }
        .header-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        @media (max-width: 480px) {
            .header-title {
                font-size: 0.75rem;
            }
            .header-logo {
                font-size: 1.2rem;
            }
        }

        /* Right: Search */
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
            min-width: 44px;
            justify-content: flex-end;
        }
        .search-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background var(--transition);
            background: transparent;
            border: none;
            color: var(--text);
        }
        .search-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* ============================================================
                   SIDEBAR
                   ============================================================ */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 300px;
            max-width: 80vw;
            z-index: 1000;
            background: var(--bg-secondary);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px 20px 32px;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 40px rgba(0, 0, 0, 0.5);
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .sidebar-brand .logo {
            font-size: 1.8rem;
        }
        .sidebar-brand .name {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all var(--transition);
            color: var(--muted);
        }
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: rgba(139, 92, 246, 0.12);
            color: var(--text);
        }
        .sidebar-nav a .icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }
        .sidebar-footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar-footer a {
            font-size: 0.8rem;
            color: var(--muted);
            transition: color var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-footer a:hover {
            color: var(--text);
        }
        .sidebar-footer .version {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 8px;
        }

        /* ============================================================
                   SEARCH OVERLAY (mobile)
                   ============================================================ */
        .search-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: var(--bg);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }
        .search-overlay.active {
            transform: translateY(0);
            visibility: visible;
        }
        .search-overlay-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-overlay-header input {
            flex: 1;
            font-size: 1.1rem;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text);
        }
        .search-overlay-header input::placeholder {
            color: var(--muted);
        }
        .search-overlay-header .close-search {
            font-size: 1.4rem;
            padding: 8px 12px;
            border-radius: 10px;
            transition: background var(--transition);
        }
        .search-overlay-header .close-search:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .search-results {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            padding-bottom: 20px;
        }
        .search-results .result-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }
        .search-results .result-card:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow);
        }
        .search-results .result-card img {
            aspect-ratio: 2/3;
            object-fit: cover;
            width: 100%;
        }
        .search-results .result-card .info {
            padding: 10px 10px 12px;
        }
        .search-results .result-card .info .title {
            font-weight: 600;
            font-size: 0.85rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .search-results .result-card .info .meta {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 4px;
        }
        .search-empty {
            color: var(--muted);
            text-align: center;
            padding: 40px 0;
            font-size: 0.95rem;
        }

        /* ============================================================
                   MAIN CONTENT
                   ============================================================ */
        .main {
            position: relative;
            z-index: 1;
            padding: 0 16px 80px;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* ============================================================
                   HERO SLIDER (Home)
                   ============================================================ */
        .hero-section {
            margin: -16px -16px 32px;
            position: relative;
            border-radius: 0 0 var(--radius) var(--radius);
            overflow: hidden;
            height: clamp(320px, 50vw, 520px);
            background: var(--bg-secondary);
        }
        .hero-slider {
            position: relative;
            height: 100%;
            width: 100%;
        }
        .hero-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.8s ease;
            background: var(--bg-secondary);
            display: flex;
            align-items: flex-end;
            padding: 32px 24px;
            background-size: cover;
            background-position: center 20%;
        }
        .hero-slide.active {
            opacity: 1;
        }
        .hero-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(11, 11, 15, 0.9) 10%, transparent 60%);
        }
        .hero-slide .content {
            position: relative;
            z-index: 2;
            max-width: 560px;
            width: 100%;
        }
        .hero-slide .content .badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.25);
            backdrop-filter: blur(8px);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--purple);
            margin-bottom: 10px;
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        .hero-slide .content h1 {
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 8px;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .hero-slide .content p {
            color: var(--muted);
            font-size: 0.9rem;
            max-width: 420px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .hero-slide .content .btn-watch {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 28px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform var(--transition), box-shadow var(--transition);
            box-shadow: 0 4px 24px rgba(139, 92, 246, 0.3);
        }
        .hero-slide .content .btn-watch:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 32px rgba(139, 92, 246, 0.4);
        }
        .hero-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            gap: 8px;
        }
        .hero-dots button {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: var(--transition);
            padding: 0;
        }
        .hero-dots button.active {
            background: var(--purple);
            width: 24px;
            border-radius: 12px;
        }

        /* ============================================================
                   SECTION HEADERS
                   ============================================================ */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 32px 0 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-header h2 .accent {
            color: var(--purple);
        }
        .section-header .see-all {
            font-size: 0.8rem;
            color: var(--muted);
            transition: color var(--transition);
            font-weight: 500;
        }
        .section-header .see-all:hover {
            color: var(--text);
        }

        /* ============================================================
                   ANIME GRID / CARDS
                   ============================================================ */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        @media (min-width: 600px) {
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 20px;
            }
        }
        @media (min-width: 1024px) {
            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 24px;
            }
        }

        .anime-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .anime-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow), var(--glow);
            border-color: rgba(139, 92, 246, 0.15);
        }
        .anime-card .poster {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
            background: var(--bg);
        }
        .anime-card .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .anime-card:hover .poster img {
            transform: scale(1.05);
        }
        .anime-card .poster .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(11, 11, 15, 0.7), transparent 50%);
            opacity: 0;
            transition: opacity var(--transition);
            display: flex;
            align-items: flex-end;
            padding: 12px;
        }
        .anime-card:hover .poster .overlay {
            opacity: 1;
        }
        .anime-card .poster .overlay .quick-watch {
            width: 100%;
            padding: 6px 0;
            border-radius: 30px;
            background: rgba(139, 92, 246, 0.85);
            backdrop-filter: blur(6px);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            transition: background var(--transition);
        }
        .anime-card .poster .overlay .quick-watch:hover {
            background: var(--purple);
        }
        .anime-card .poster .score {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fbbf24;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .anime-card .poster .ep-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .anime-card .info {
            padding: 12px 12px 14px;
        }
        .anime-card .info .title {
            font-weight: 700;
            font-size: 0.85rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        .anime-card .info .meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.7rem;
            color: var(--muted);
            flex-wrap: wrap;
        }
        .anime-card .info .meta .type {
            background: rgba(139, 92, 246, 0.15);
            padding: 0 10px;
            border-radius: 20px;
            color: var(--purple);
            font-weight: 600;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ============================================================
                   SKELETON LOADING
                   ============================================================ */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-secondary) 25%, rgba(255, 255, 255, 0.03) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        .skeleton-card {
            aspect-ratio: 2/3;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
        }
        .skeleton-text {
            height: 12px;
            border-radius: 6px;
            background: var(--bg-secondary);
            width: 80%;
            margin-top: 8px;
        }
        .skeleton-text.short {
            width: 50%;
        }

        /* ============================================================
                   ANIME DETAILS PAGE
                   ============================================================ */
        .anime-detail {
            margin: -16px -16px 0;
        }
        .anime-detail .banner {
            height: clamp(200px, 35vw, 400px);
            background-size: cover;
            background-position: center 30%;
            position: relative;
            border-radius: 0 0 var(--radius) var(--radius);

    <script>
        (function() {
            'use strict';

            // ============================================================
            // CONFIG
            // ============================================================
            const CONFIG = {
                API_BASE: 'https://api.jikan.moe/v4',
                STREAM_BASE: 'https://megaplay.buzz/stream/mal',
                CACHE_DURATION: 3600, // 1 hour
                ANIME_PER_PAGE: 20,
                RECOMMENDATIONS_LIMIT: 12,
            };

            // ============================================================
            // UTILITY FUNCTIONS
            // ============================================================
            const Utils = {
                debounce(fn, delay = 300) {
                    let timer;
                    return function(...args) {
                        clearTimeout(timer);
                        timer = setTimeout(() => fn.apply(this, args), delay);
                    };
                },

                getParam(param) {
                    const url = new URL(window.location.href);
                    return url.searchParams.get(param);
                },

                setParam(param, value) {
                    const url = new URL(window.location.href);
                    url.searchParams.set(param, value);
                    window.history.pushState({}, '', url.toString());
                },

                truncate(text, len = 160) {
                    if (text.length <= len) return text;
                    return text.slice(0, len) + '...';
                },

                formatDate(dateStr) {
                    if (!dateStr) return 'N/A';
                    try {
                        const d = new Date(dateStr);
                        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                    } catch { return dateStr; }
                },

                getEpisodeKey(malId, ep) {
                    return `watch_${malId}_${ep}`;
                },

                getWatchProgress(malId, ep) {
                    const key = this.getEpisodeKey(malId, ep);
                    return localStorage.getItem(key) || null;
                },

                setWatchProgress(malId, ep) {
                    const key = this.getEpisodeKey(malId, ep);
                    localStorage.setItem(key, 'watched');
                    // Also store in history
                    const history = JSON.parse(localStorage.getItem('watchHistory') || '[]');
                    const entry = { malId: String(malId), episode: String(ep), timestamp: Date.now() };
                    const existing = history.findIndex(h => h.malId === String(malId) && h.episode === String(ep));
                    if (existing !== -1) {
                        history[existing] = entry;
                    } else {
                        history.push(entry);
                    }
                    // Keep last 50
                    if (history.length > 50) history.splice(0, history.length - 50);
                    localStorage.setItem('watchHistory', JSON.stringify(history));
                },

                getWatchHistory() {
                    return JSON.parse(localStorage.getItem('watchHistory') || '[]');
                },

                getContinueWatching() {
                    const history = this.getWatchHistory();
                    // Get unique anime with latest episode
                    const map = new Map();
                    for (const h of history) {
                        const key = h.malId;
                        if (!map.has(key) || map.get(key).timestamp < h.timestamp) {
                            map.set(key, h);
                        }
                    }
                    return Array.from(map.values()).sort((a, b) => b.timestamp - a.timestamp);
                },

                // Simple in-memory cache
                cache: new Map(),

                async fetchWithCache(url, ttl = CONFIG.CACHE_DURATION) {
                    const key = url;
                    const now = Date.now();
                    if (this.cache.has(key)) {
                        const entry = this.cache.get(key);
                        if (now - entry.timestamp < ttl * 1000) {
                            return entry.data;
                        }
                    }
                    try {
                        const res = await fetch(url);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const data = await res.json();
                        this.cache.set(key, { data, timestamp: now });
                        return data;
                    } catch (e) {
                        console.warn('Fetch error:', e);
                        throw e;
                    }
                },

                // Get anime details from Jikan
                async getAnimeDetails(malId) {
                    const data = await this.fetchWithCache(`${CONFIG.API_BASE}/anime/${malId}/full`);
                    return data.data;
                },

                // Get anime episodes (from Jikan or generate)
                async getAnimeEpisodes(malId) {
                    try {
                        const data = await this.fetchWithCache(`${CONFIG.API_BASE}/anime/${malId}/episodes`);
                        return data.data || [];
                    } catch {
                        return [];
                    }
                },

                // Get trending anime
                async getTrending(page = 1) {
                    const data = await this.fetchWithCache(`${CONFIG.API_BASE}/top/anime?page=${page}&limit=${CONFIG.ANIME_PER_PAGE}`);
                    return data.data || [];
                },

                // Search anime
                async searchAnime(query, page = 1) {
                    if (!query.trim()) return [];
                    const data = await this.fetchWithCache(
                        `${CONFIG.API_BASE}/anime?q=${encodeURIComponent(query)}&page=${page}&limit=${CONFIG.ANIME_PER_PAGE}`
                    );
                    return data.data || [];
                },

                // Get recommendations for an anime
                async getRecommendations(malId) {
                    const data = await this.fetchWithCache(`${CONFIG.API_BASE}/anime/${malId}/recommendations`);
                    return data.data || [];
                },

                // Get seasonal anime
                async getSeasonal(year, season) {
                    const data = await this.fetchWithCache(`${CONFIG.API_BASE}/seasons/${year}/${season}`);
                    return data.data || [];
                },

                // Get upcoming anime
                async getUpcoming() {
                    const data = await this.fetchWithCache(`${CONFIG.API_BASE}/seasons/upcoming`);
                    return data.data || [];
                },

                // Generate stream URL
                getStreamUrl(malId, episode, type = 'sub') {
                    return `${CONFIG.STREAM_BASE}/${malId}/${episode}/${type}`;
                },

                // Generate episode objects
                generateEpisodes(malId, totalEpisodes = 12) {
                    const eps = [];
                    const count = Math.min(parseInt(totalEpisodes) || 12, 500);
                    for (let i = 1; i <= count; i++) {
                        eps.push({
                            episode: String(i),
                            servers: [
                                { sub: 'VidCloud', value: this.getStreamUrl(malId, i, 'sub') },
                                { dub: 'VidCloud', value: this.getStreamUrl(malId, i, 'dub') }
                            ]
                        });
                    }
                    return eps;
                },

                // Generate MAL link
                getMalLink(malId) {
                    return `https://myanimelist.net/anime/${malId}`;
                }
            };

            // ============================================================
            // UI RENDERERS
            // ============================================================
            const UI = {
                mainEl: document.getElementById('mainContent'),

                renderHome(data) {
                    const trending = data.trending || [];
                    const upcoming = data.upcoming || [];
                    const history = Utils.getWatchHistory();
                    const continueList = Utils.getContinueWatching();

                    // Build hero from trending top 5
                    const heroItems = trending.slice(0, 5);

                    let html = `
                        <!-- HERO -->
                        <div class="hero-section">
                            <div class="hero-slider" id="heroSlider">
                                ${heroItems.map((anime, i) => `
                                    <div class="hero-slide ${i === 0 ? 'active' : ''}"

                _card(anime, episode = null) {

                    const status = anime.status || '';

                    return `

                                ${score ? `<span class="score">${score}</span>` : ''}
                                ${episode ? `<span class="ep-badge">EP ${episode}</span>` : (episodes !== '?' ? `<span class="ep-badge">${episodes} eps</span>` : '')}

                                </div>

                                    ${status ? `<span>${status}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                },

                _skeletonCards(count = 8) {
                    return Array(count).fill(`
                        <div class="anime-card">
                            <div class="poster skeleton"></div>
                            <div class="info">
                                <div class="skeleton-text" style="width:90%"></div>
                                <div class="skeleton-text short" style="margin-top:6px;"></div>
                            </div>
                        </div>
                    `).join('');
                },

                _initHero() {
                    const slides = document.querySelectorAll('.hero-slide');
                    const dots = document.querySelectorAll('#heroDots button');
                    if (!slides.length) return;
                    let current = 0;
                    let timer;

                    const goTo = (index) => {
                        slides.forEach(s => s.classList.remove('active'));
                        dots.forEach(d => d.classList.remove('active'));
                        slides[index]?.classList.add('active');
                        dots[index]?.classList.add('active');
                        current = index;
                    };

                    const next = () => {
                        goTo((current + 1) % slides.length);
                    };

                    const resetTimer = () => {
                        clearInterval(timer);
                        timer = setInterval(next, 5000);
                    };

                    dots.forEach((dot, i) => {
                        dot.addEventListener('click', () => {
                            goTo(i);
                            resetTimer();
                        });
                    });

                    resetTimer();

                    // Touch swipe support
                    let startX = 0;
                    const slider = document.getElementById('heroSlider');
                    slider?.addEventListener('touchstart', (e) => {
                        startX = e.touches[0].clientX;
                    });
                    slider?.addEventListener('touchend', (e) => {
                        const endX = e.changedTouches[0].clientX;
                        const diff = startX - endX;
                        if (Math.abs(diff) > 50) {
                            if (diff > 0) {
                                goTo((current + 1) % slides.length);
                            } else {
                                goTo((current - 1 + slides.length) % slides.length);
                            }
                            resetTimer();
                        }
                    });
                },

                async _loadRandom() {
                    const grid = document.getElementById('randomGrid');
                    if (!grid) return;
                    grid.innerHTML = this._skeletonCards(4);
                    try {
                        // Get a random page from top anime

                        const data = await Utils.fetchWithCache(
                            `${CONFIG.API_BASE}/top/anime?page=${page}&limit=20`
                        );
                        const list = data.data || [];
                        const shuffled = list.sort(() => Math.random() - 0.5).slice(0, 4);
                        grid.innerHTML = shuffled.map(a => this._card(a)).join('');
                        // Attach click events
                        grid.querySelectorAll('.anime-card').forEach(el => {
                            el.addEventListener('click', () => {
                                const id = el.dataset.id;
                                if (id) window.location.href = `/anime.html?id=${id}`;
                            });
                        });
                    } catch {
                        grid.innerHTML = '<p style="color:var(--muted)">Could not load random anime.</p>';

                                <a href="https://github.com" target="_blank" rel="noopener">🐙 GitHub</a>
                                <a href="#" target="_blank" rel="noopener">💬 Discord</a>
                                <a href="https://myanimelist.net" target="_blank" rel="noopener">📖 MAL</a>
                            </div>
                            <div style="margin-top:32px;color:var(--muted);font-size:0.8rem;">
                                <p>Version 2.0.0 · Powered by Jikan API</p>
                                <p style="margin-top:4px;font-size:0.7rem;color:rgba(255,255,255,0.15);">
                                    © 2026 AnimeStream · All rights reserved.
                                </p>
                            </div>
                        </div>
                    `;
                },

                // ============================================================
                // ROUTER
                // ============================================================
                async router() {
                    const loader = document.getElementById('loader');
                    try {
                        // Handle GitHub Pages subfolder routing (e.g., /HindiAnime4ALL/)
                        const path = window.location.pathname.replace(/\/$/, '');
                        const repoName = 'HindiAnime4ALL';
                        let route = path;

                        if (path.includes(repoName)) {
                            // Extract the part after the repo name
                            const parts = path.split(repoName);
                            route = parts.length > 1 ? parts[1] : '/';
                            if (route === '') route = '/';
                        }

                        const params = new URLSearchParams(window.location.search);
                        const id = params.get('id');
                        const ep = params.get('ep') || '1';
                        const type = params.get('type') || 'sub';
                        const q = params.get('q') || '';

                        console.log('Route:', route, 'Params:', { id, ep, type, q });

                        if (route === '/' || route === '/index.html') {
                            const [trending, upcoming] = await Promise.all([
                                Utils.getTrending(1),
                                Utils.getUpcoming()
                            ]);
                            await UI.renderHome({ trending, upcoming });
                        } else if (route === '/anime.html' && id) {
                            await UI.renderAnimeDetails(id);
                        } else if (route === '/watch.html' && id) {
                            await UI.renderWatch(id, ep, type);
                        } else if (route === '/search.html') {
                            await UI.renderSearch(q);
                        } else if (route === '/schedule.html') {
                            await UI.renderSchedule();
                        } else if (route === '/creator.html') {
                            UI.renderCreator();
                        } else {
                            // 404 fallback
                            UI.mainEl.innerHTML = `
                                <div style="padding:80px 0;text-align:center;color:var(--muted);">
                                    <div style="font-size:4rem;margin-bottom:16px;">404</div>
                                    <h2 style="font-weight:700;">Page not found</h2>
                                    <p style="margin-top:8px;">The page you're looking for doesn't exist.</p>
                                    <a href="/" style="display:inline-block;margin-top:20px;padding:10px 28px;border-radius:30px;background:var(--purple);color:#fff;font-weight:600;">Go Home</a>
                                </div>
                            `;
                        }
                    } catch (e) {
                        console.error('Router error:', e);
                        UI.mainEl.innerHTML = `
                            <div style="padding:80px 0;text-align:center;color:var(--muted);">
                                <div style="font-size:3rem;margin-bottom:12px;">⚠️</div>
                                <h2 style="font-weight:700;">Something went wrong</h2>
                                <p style="margin-top:8px;">Please try refreshing the page.</p>
                                <button onclick="location.reload()" style="display:inline-block;margin-top:20px;padding:10px 28px;border-radius:30px;background:var(--purple);color:#fff;font-weight:600;">Refresh</button>
                            </div>
                        `;
                    } finally {
                        // ** CRITICAL FIX: ALWAYS HIDE THE LOADER **
                        if (loader) {
                            loader.classList.add('hidden');
                        }
                        // Attach click events to anime cards
                        UI.mainEl.querySelectorAll('.anime-card').forEach(el => {
                            el.addEventListener('click', function(e) {
                                if (e.target.closest('.quick-watch')) return;
                                const id = this.dataset.id;
                                if (id) window.location.href = `/anime.html?id=${id}`;
                            });
                        });
                    }
                }
            };

            // ============================================================
            // NAV & SEARCH CONTROLS
            // ============================================================
            const hamburger = document.getElementById('hamburgerBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const searchBtn = document.getElementById('searchBtn');
            const searchOverlay = document.getElementById('searchOverlay');
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const closeSearchBtn = document.getElementById('closeSearchBtn');

            // Toggle sidebar
            function toggleSidebar() {
                const active = sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                hamburger.classList.toggle('active');
                hamburger.setAttribute('aria-expanded', active);
                document.body.style.overflow = active ? 'hidden' : '';
            }

            hamburger?.addEventListener('click', toggleSidebar);
            overlay?.addEventListener('click', toggleSidebar);

            // Search overlay
            function openSearch() {
                searchOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                setTimeout(() => searchInput?.focus(), 100);
            }

            function closeSearch() {
                searchOverlay.classList.remove('active');
                document.body.style.overflow = '';
                searchResults.innerHTML =
                '<div class="search-empty">Start typing to search anime...</div>';
                if (searchInput) searchInput.value = '';
            }

            searchBtn?.addEventListener('click', openSearch);
            closeSearchBtn?.addEventListener('click', closeSearch);

            // Escape key to close
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (searchOverlay.classList.contains('active')) closeSearch();
                    if (sidebar.classList.contains('active')) toggleSidebar();
                }
            });

            // Search live
            if (searchInput) {
                const doSearch = Utils.debounce(async (query) => {
                    if (!query.trim()) {
                        searchResults.innerHTML =
                            '<div class="search-empty">Start typing to search anime...</div>';
                        return;
                    }
                    searchResults.innerHTML =
                        '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--muted);">Searching...</div>';
                    try {
                        const data = await Utils.searchAnime(query);
                        if (data.length === 0) {
                            searchResults.innerHTML =
                                `<div class="search-empty">No results for "${query}"</div>`;
                            return;
                        }
                        searchResults.innerHTML = data.slice(0, 10).map(a => `
                            <div class="result-card" data-id="${a.mal_id}">
                                <img src="${a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || ''}" 
                                     alt="${a.title}" loading="lazy" 
                                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22%3E%3Crect fill=%22%23121218%22 width=%22200%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%239ca3af%22 font-size=%2230%22 font-family=%22sans-serif%22%3E🎬%3C/text%3E%3C/svg%3E'" />
                                <div class="info">
                                    <div class="title">${a.title || 'Untitled'}</div>
                                    <div class="meta">${a.type || 'TV'} • ${a.episodes || '?'} eps</div>
                                </div>
                            </div>
                        `).join('');

                        searchResults.querySelectorAll('.result-card').forEach(el => {
                            el.addEventListener('click', () => {
                                const id = el.dataset.id;
                                if (id) {
                                    closeSearch();
                                    window.location.href = `/anime.html?id=${id}`;
                                }
                            });
                        });
                    } catch {
                        searchResults.innerHTML =
                            '<div class="search-empty">Error searching. Try again.</div>';
                    }
                }, 300);

                searchInput.addEventListener('input', () => doSearch(searchInput.value));
                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const query = searchInput.value.trim();
                        if (query) {
                            closeSearch();
                            window.location.href = `/search.html?q=${encodeURIComponent(query)}`;
                        }
                    }
                });
            }

            // ============================================================
            // CURSOR GLOW
            // ============================================================
            const cursor = document.getElementById('cursor-glow');
            if (cursor) {
                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });
            }

            // ============================================================
            // PARTICLES
            // ============================================================
            const canvas = document.getElementById('particles-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let particles = [];
                let w, h;

                function resize() {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                }
                resize();
                window.addEventListener('resize', resize);

                class Particle {
                    constructor() {
                        this.x = Math.random() * w;
                        this.y = Math.random() * h;
                        this.size = Math.random() * 2 + 0.5;
                        this.speedX = (Math.random() - 0.5) * 0.3;
                        this.speedY = (Math.random() - 0.5) * 0.3;
                        this.opacity = Math.random() * 0.5 + 0.1;
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;
                        if (this.x < 0 || this.x > w) this.speedX *= -1;
                        if (this.y < 0 || this.y > h) this.speedY *= -1;
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(139, 92, 246, ${this.opacity})`;
                        ctx.fill();
                    }
                }

                function initParticles(count = 60) {
                    particles = [];
                    for (let i = 0; i < count; i++) {
                        particles.push(new Particle());
                    }
                }
                initParticles();

                function animateParticles() {
                    ctx.clearRect(0, 0, w, h);
                    particles.forEach(p => {
                        p.update();
                        p.draw();
                    });
                    // Draw connections
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 120) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(139, 92, 246, ${0.05 * (1 - dist / 120)})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                    requestAnimationFrame(animateParticles);
                }
                animateParticles();
            }

            // ============================================================
            // HEADER SCROLL EFFECT
            // ============================================================
            const header = document.getElementById('mainHeader');
            let lastScroll = 0;
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                if (scrollY > 20) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
                lastScroll = scrollY;
            });

            // ============================================================
            // INIT ROUTER
            // ============================================================
            // Handle back/forward
            window.addEventListener('popstate', () => UI.router());

            // Initial render
            UI.router();

            // ============================================================
            // SERVICE WORKER REGISTRATION (PWA)
            // ============================================================
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .catch(() => { /* silent fail */ });
            }

            console.log('🎬 AnimeStream v2.0.0 loaded');
            console.log('📡 Powered by Jikan API + Cloudflare');

        })();
    </script>

</body>
